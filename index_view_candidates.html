  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Arial, "Malgun Gothic", sans-serif;
    }
    .panel {
      position: absolute;
      z-index: 5;
      top: 10px;
      left: 10px;
      width: 500px;
      max-width: calc(100vw - 28px);
      padding: 8px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #d9dee7;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
      font-size: 10px;
      line-height: 1.28;
    }
    .panel h1 {
      margin: 0 0 4px;
      font-size: 13px;
    }
    .row {
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }
    label {
      font-weight: 700;
    }
    input[type="text"],
    input[type="number"] {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid #c9d0dc;
      border-radius: 6px;
      font-size: 13px;
    }
    input[type="file"] {
      width: 100%;
      font-size: 12px;
    }
    button {
      padding: 5px 7px;
      border: 0;
      border-radius: 6px;
      background: #2563eb;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary {
      background: #475569;
    }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 6px;
      align-items: center;
    }
    .zone-tabs,
    .map-tabs {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }
    .zone-tabs button,
    .map-tabs button {

      color: #1e293b;
      min-height: 30px;
      padding: 4px 6px;
      font-size: 12px;
    }
    .buttons button {
      min-height: 28px;
      font-size: 11px;
    }
    .floor-total-angle {
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      padding: 0 8px;
      border-radius: 6px;
      background: rgba(15, 23, 42, 0.08);
      color: #0f172a;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }
    .zone-tabs button.active,
    .map-tabs button.active {
      background: #2563eb;
      color: #ffffff;
    }
    .status {
      margin-top: 8px;
      padding: 8px;
      border-radius: 6px;
      background: #f1f5f9;
      color: #334155;
      white-space: pre-wrap;
    }
    .status[hidden] {
      display: none;
    }
    .hint {
      margin-top: 4px;
      color: #64748b;
      font-size: 10px;
    }
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-top: 4px;
    }
    .legend button {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 5px;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      background: #ffffff;
      color: #1f2937;
      font-size: 9px;
      font-weight: 700;
    }
    .legend button.active {
      border-color: #111827;
      box-shadow: 0 0 0 2px rgba(17, 24, 39, 0.15);
    }
    .swatch {
      width: 8px;
      height: 8px;
      border: 1px solid rgba(0, 0, 0, 0.25);
      border-radius: 2px;
    }
    .promo-card {
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px solid #d9e3f3;
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(246,249,255,0.98) 100%);

    .promo-accent {

    .promo-contact {

    .selection-detail {

    .selection-detail-body {

      padding: 0;
      font-size: 9px;
    }
    .selection-detail-empty {

    }
    .selection-detail-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 9px;
      line-height: 1.2;
    }
    .selection-detail-table th,
    .selection-detail-table td {
      padding: 4px 7px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      vertical-align: top;
    }
    .selection-detail-table th {
      width: 74px;
      color: #e2e8f0;
      background: rgba(255, 255, 255, 0.06);
      white-space: nowrap;
      word-break: keep-all;
    }
    .selection-detail-table td {

    }
    .cesium-infoBox {

    }
    .cesium-infoBox-title {

    }
    .cesium-infoBox-defaultTable th {

      white-space: nowrap;
      word-break: keep-all;
    }
    .cesium-infoBox-defaultTable td {
      word-break: keep-all;
      line-height: 1.5;
    }
    .candidate-summary {
      margin-top: 6px; padding: 7px 8px; border-radius: 7px;
      background: #eff6ff; color: #1e3a8a; font-size: 10px; font-weight: 800; line-height: 1.45;
    }
    .floor-change {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      align-items: center;
    }
    .floor-band {
      display: inline-block;

    }
    .floor-band-1 {

    }
    .floor-band-2 {

    }

    @media (max-width: 768px) {

      }
      .panel h1 {

      }
      .hint {

      }
      .zone-tabs,
      .map-tabs {
        display: grid;

      }
      .map-tabs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .zone-tabs button,
      .map-tabs button,
      .buttons button {
        min-height: 27px;
        padding: 4px 3px;
        border-radius: 5px;
        font-size: 10px;

      }
      .buttons {
        display: grid;
        grid-template-columns: 1fr;

        margin-top: 5px;
      }
      .row {
        gap: 3px;
        margin-top: 5px;
      }
      .legend {
        max-height: 14svh;
        overflow-y: auto;

      }
      .legend-detail-wrap {

      .selection-detail {
        display: block;
      }
      .selection-detail-body {

      }
      .legend button {

      }
      .swatch {

      }
      .promo-card {

        font-size: 11px;
      }
      .promo-contact {
        font-size: 9.5px;
      }
      .promo-note {
        font-size: 8px;
        line-height: 1.35;
      }
      .cesium-infoBox {
        top: 8px !important;
        left: calc(46vw + 4px) !important;
        right: 8px !important;
        bottom: auto !important;
        width: auto !important;
        max-width: none !important;
        max-height: 44svh !important;
        font-size: 50% !important;
      }
      .cesium-infoBox-title {
        min-height: 26px;
        padding: 6px 28px 5px 8px;
        font-size: 10px !important;
        line-height: 1.25;
      }
      .cesium-infoBox-body {
        max-height: calc(44svh - 34px) !important;
        overflow: auto !important;
      }
      .cesium-infoBox-defaultTable th {
        width: 34px;

      }

        word-break: keep-all;

      }

    }
    @media (max-width: 480px) {
      .panel {
        width: calc(46vw - 8px);
        max-height: 45svh;
      }
      .zone-tabs button,
      .map-tabs button,
      .buttons button {

        font-size: 9px;
      }

      .cesium-infoBox {

      }
      .cesium-infoBox-body {
        max-height: calc(45svh - 34px) !important;
      }
    }
    @media (max-width: 900px) and (orientation: landscape) {
      .panel {

      }
      .legend-detail-wrap {
        grid-template-columns: 1fr;
      }
      .selection-detail {
        display: block;
      }

        max-height: none;
      }
      .cesium-infoBox {
        left: auto !important;
        width: 330px !important;

        bottom: 14px !important;
      }
      .cesium-infoBox-body {
        max-height: calc(100svh - 134px) !important;
      }

<body>
  <div id="cesiumContainer"></div>

  <div class="panel">
    <h1 id="mapMainTitle">압구정 조망 시뮬레이션</h1>
    <div class="hint">버전: v41 / <strong>정밀도면이 아닙니다</strong></div>
    <div id="candidateSummary" class="candidate-summary" hidden></div>
    <div class="zone-tabs" aria-label="구역 선택">
      <button type="button" class="active" data-zone="ALL">전체</button>
      <button type="button" data-zone="2">2구역</button>
      <button type="button" data-zone="3">3구역</button>
      <button type="button" data-zone="4">4구역</button>
      <button type="button" data-zone="5">5구역</button>
    </div>
    <div class="map-tabs" aria-label="배경지도 선택">
      <button type="button" class="active" data-map="street">도로지도</button>
      <button type="button" data-map="light">밝은지도</button>
      <button type="button" data-map="satellite">위성지도</button>
    </div>
    <div class="buttons">
      <input id="eyeFloorInput" type="number" min="1" step="1" inputmode="numeric" placeholder="층수" style="width:78px; padding:5px 7px; font-size:11px;" />
      <span id="floorTotalAngle" class="floor-total-angle">유닛 선택</span>
      <button id="startEyeRotate" class="secondary">눈높이 360도</button>
      <button id="stopRotate" class="secondary">회전 정지</button>
    </div>
    <div id="status" class="status" hidden></div>
    <div class="legend-detail-wrap">
      <div class="legend-section">
        <label>평형 범례</label>
        <div class="legend" id="legend"></div>
        <div class="promo-card" aria-label="업소 안내">
          <div class="promo-accent"></div>
          <div class="promo-brand">압구정 원 부동산중개</div>
          <div class="promo-contact">02.540.3334 · 010.3065.1780</div>
          <div class="promo-note">상담을 원하시는 분은 사전에 시간 약속 후 방문 부탁드립니다.</div>
        </div>
      </div>
      <div class="selection-detail" aria-live="polite">
        <div class="selection-detail-title" id="selectionDetailTitle">선택 상세</div>
        <div class="selection-detail-body" id="selectionDetailBody">
          <div class="selection-detail-empty">유닛을 클릭하면 상세설명이 표시됩니다.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJkYzAxNjVhNS04MjhiLTRmODctODA4Mi04NWMxMzE5OWY0N2QiLCJpZCI6NDUyNDQ0LCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3ODMxNzI4NzN9.mCqCGlQbTgG6EPdX5iGrhhyKi7TYcta1z6u9kPQE_V0";

    const CANDIDATE_CONFIG = window.APJ_VIEW_CANDIDATE_CONFIG || null;
    const APGUJEONG_CENTER = Cesium.Cartesian3.fromDegrees(127.03255, 37.52545, 720);
    const APGUJEONG_ROTATE_CENTER = Cesium.Cartesian3.fromDegrees(127.03255, 37.52545, 80);
    const AUTO_ROTATE_SPEED_DEG_PER_SEC = 8;
    const DATA_VERSION = "v41-same-dong-envelope-20260709";
    const ANGLE_OPEN_RATIO_THRESHOLD = 0.5;
    const BLOCKER_PENTHOUSE_FLOORS = 1;
    const SAME_DONG_CORE_GAP_M = 10;
    const SAME_DONG_CORE_BRIDGE_STEP_M = 2.5;
    const RAW_DATA_BASE = "https://raw.githubusercontent.com/ckh3455/apgujeong-allocation-view-recommender/main/";
    const OSM_CLIP_URLS = [
      RAW_DATA_BASE + "apgujeong_zone_boundaries.geojson",
      RAW_DATA_BASE + "apgujeong_osm_clipping_zones.geojson"
    ];
    const OSM_BUILDING_VERTICAL_OFFSET_M = Number(new URLSearchParams(window.location.search).get("osmOffset") || -62);
    const ALL_RIVER_URL = RAW_DATA_BASE + "hangang_line_all.geojson";
    const ZONE_CONFIGS = {
      "ALL": {
        label: "전체",
        zoneIds: ["2", "3", "4", "5"]
      },
      "2": {
        label: "2구역",
        unitsUrl: RAW_DATA_BASE + "apgujeong_2_units.geojson",
        riverUrl: ALL_RIVER_URL
      },
      "3": {
        label: "3구역",
        unitsUrl: RAW_DATA_BASE + "apg3_unit_polygon.geojson",
        riverUrl: ALL_RIVER_URL
      },
      "4": {
        label: "4구역",
        unitsUrl: RAW_DATA_BASE + "apgujeong_4_units.geojson",
        riverUrl: ALL_RIVER_URL
      },
      "5": {
        label: "5구역",
        unitsUrl: RAW_DATA_BASE + "apgujeong_5_units.geojson",
        riverUrl: ALL_RIVER_URL
      }
    };
    const MAP_CONFIGS = {
      street: {
        label: "도로지도",
        url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}",
        credit: "Esri World Street Map"
      },
      light: {
        label: "밝은지도",
        url: "https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png",
        credit: "CARTO, OpenStreetMap"
      },
      satellite: {
        label: "위성지도",
        url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
        credit: "Esri World Imagery"
      }
    };
    const statusEl = document.getElementById("status");
    const mapMainTitleEl = document.getElementById("mapMainTitle");
    const candidateSummaryEl = document.getElementById("candidateSummary");
    const legendEl = document.getElementById("legend");
    const selectionDetailTitleEl = document.getElementById("selectionDetailTitle");
    const selectionDetailBodyEl = document.getElementById("selectionDetailBody");
    const eyeFloorInputEl = document.getElementById("eyeFloorInput");
    const startEyeRotateButton = document.getElementById("startEyeRotate");
    const floorTotalAngleEl = document.getElementById("floorTotalAngle");
    const riverExtendInput = document.getElementById("riverExtendMeters");
    const PUBLIC_VWORLD_KEY = "";
    const VWORLD_KEY_STORAGE = "apgujeong_vworld_key";

    const viewer = new Cesium.Viewer("cesiumContainer", {
      animation: false,
      timeline: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: true,
      baseLayerPicker: false,
      navigationHelpButton: false,
      infoBox: false,
      selectionIndicator: true,
      sceneMode: Cesium.SceneMode.SCENE3D,
      baseLayer: false,
      terrainProvider: new Cesium.EllipsoidTerrainProvider()
    });

    viewer.scene.globe.depthTestAgainstTerrain = false;
    function enable3DControls() {
      const controller = viewer.scene.screenSpaceCameraController;
      controller.enableInputs = true;
      controller.enableRotate = true;
      controller.enableTilt = true;
      controller.enableTranslate = true;
      controller.enableZoom = true;
      controller.enableLook = true;
      controller.minimumZoomDistance = 20;
      controller.maximumZoomDistance = 6000;
      controller.inertiaZoom = 0.18;
      controller.maximumMovementRatio = 0.055;
      if ("_zoomFactor" in controller) {
        controller._zoomFactor = 1.8;
      }
      if (viewer.scene.mode !== Cesium.SceneMode.SCENE3D) {
        viewer.scene.morphTo3D(0);
      }
    }

    function reset3DView() {
      enable3DControls();
      viewer.scene.camera.setView({
        destination: APGUJEONG_CENTER,
        orientation: {
          heading: Cesium.Math.toRadians(335),
          pitch: Cesium.Math.toRadians(-48),
          roll: 0
        }
      });
    }

    reset3DView();

    let unitsDataSource = null;
    let vworldLayer = null;
    let publicBaseLayer = null;
    const overlayEntities = [];
    const selectedSightEntities = [];
    const riverLineEntities = [];
    let currentFilter = "ALL";
    let footprints = [];
    let riverSegments = [];
    let riverPoints = [];
    let activeRiverSegments = riverSegments;
    let activeRiverPoints = riverPoints;
    const riverRawGeoJsonByZone = new Map();
    const riverContextsByZone = new Map();
    let riverLinesForDisplay = [];
    let riverRawGeoJson = null;
    let lastRiverStats = null;
    let currentZoneId = (CANDIDATE_CONFIG && CANDIDATE_CONFIG.zoneId) ? String(CANDIDATE_CONFIG.zoneId) : "ALL";
    let loadedLegendItems = [];
    let autoRotateActive = false;
    let autoRotateCenter = null;
    let autoRotateEyePosition = null;
    let autoRotateMode = "orbit";
    let autoRotateHeadingDeg = 335;
    let autoRotatePitch = Cesium.Math.toRadians(-38);
    let autoRotateRange = 900;
    let autoRotateLastMs = 0;
    let eyeRotateFrameId = null;
    let osmBuildingsTileset = null;
    let osmBuildingsLoading = false;
    let osmBuildingsVisible = false;
    let lastPickedHeightScreenPosition = null;
    let worldTerrainProvider = null;
    let worldTerrainProviderPromise = null;
    const viewAnalysisByFid = new Map();
    const calculatedZones = new Set();
    const calculatingZonePromises = new Map();
    let zoneCalculationQueue = Promise.resolve();

    function setStatus(message) {
      if (!statusEl) return;
      statusEl.textContent = message;
      statusEl.hidden = /로드 완료/.test(message);
    }

    function setActiveMapButton(mapId) {
      for (const button of document.querySelectorAll("[data-map]")) {
        button.classList.toggle("active", button.dataset.map === mapId);
      }
    }

    function applyPublicBaseMap(mapId = "street") {
      if (publicBaseLayer) {
        viewer.imageryLayers.remove(publicBaseLayer, true);
        publicBaseLayer = null;
      }

      if (vworldLayer) {
        viewer.imageryLayers.remove(vworldLayer, true);
        vworldLayer = null;
      }

      const config = MAP_CONFIGS[mapId] || MAP_CONFIGS.street;
      const provider = new Cesium.UrlTemplateImageryProvider({
        url: config.url,
        minimumLevel: 0,
        maximumLevel: 19,
        tilingScheme: new Cesium.WebMercatorTilingScheme(),
        credit: config.credit
      });

      publicBaseLayer = viewer.imageryLayers.addImageryProvider(provider, 0);
      setActiveMapButton(mapId);

    function readStoredVworldKey() {
      const params = new URLSearchParams(window.location.search);
      const keyFromUrl = (params.get("key") || params.get("vworldKey") || "").trim();
      if (keyFromUrl) {
        localStorage.setItem(VWORLD_KEY_STORAGE, keyFromUrl);

        params.delete("vworldKey");
        const cleanQuery = params.toString();
        const cleanUrl = `${window.location.pathname}${cleanQuery ? `?${cleanQuery}` : ""}${window.location.hash}`;

    function stopAutoRotate() {
      autoRotateActive = false;
      autoRotateCenter = null;
      autoRotateEyePosition = null;
      autoRotateMode = "orbit";
      autoRotateLastMs = 0;
      if (eyeRotateFrameId !== null) {
        cancelAnimationFrame(eyeRotateFrameId);
        eyeRotateFrameId = null;
      }
      viewer.camera.lookAtTransform(Cesium.Matrix4.IDENTITY);
      enable3DControls();
      setStatus("회전을 정지했습니다.");
    }

    function cameraDistanceTo(center, fallback) {
      const distance = Cesium.Cartesian3.distance(viewer.camera.positionWC, center);
      if (!Number.isFinite(distance) || distance < 120 || distance > 3000) return fallback;
      return distance;
    }

    function getSelectedRotateCenter() {
      const entity = viewer.selectedEntity;
      if (!entity || !entity.positionForSight) return null;
      const lonLat = xyToLonLat(entity.positionForSight.xy);
      const height = Math.max(30, Number(entity.positionForSight.height || 80) * 0.45);
      return Cesium.Cartesian3.fromDegrees(lonLat.lon, lonLat.lat, height);
    }

    function startAutoRotate(center, range) {
      autoRotateCenter = center;
      autoRotateRange = range;
      autoRotateHeadingDeg = Cesium.Math.toDegrees(viewer.camera.heading || Cesium.Math.toRadians(335));
      autoRotatePitch = Cesium.Math.toRadians(-38);
      autoRotateLastMs = performance.now();
      autoRotateActive = true;
      autoRotateMode = "orbit";
      autoRotateEyePosition = null;
      if (eyeRotateFrameId !== null) {
        cancelAnimationFrame(eyeRotateFrameId);
        eyeRotateFrameId = null;
      }
      enable3DControls();
    }

    function runEyeRotateFrame(now) {
      if (!autoRotateActive || autoRotateMode !== "eye" || !autoRotateEyePosition) {
        eyeRotateFrameId = null;
        return;
      }
      const deltaSeconds = autoRotateLastMs ? Math.min((now - autoRotateLastMs) / 1000, 0.1) : 0;
      autoRotateLastMs = now;
      autoRotateHeadingDeg = normalizeAngle(autoRotateHeadingDeg + AUTO_ROTATE_SPEED_DEG_PER_SEC * deltaSeconds);
      viewer.camera.setView({
        destination: autoRotateEyePosition,
        orientation: {
          heading: Cesium.Math.toRadians(autoRotateHeadingDeg),
          pitch: autoRotatePitch,
          roll: 0
        }
      });
      if (viewer.scene && viewer.scene.requestRender) viewer.scene.requestRender();
      eyeRotateFrameId = requestAnimationFrame(runEyeRotateFrame);
    }

    function selectedFootprintForEyeView() {
      const entity = viewer.selectedEntity;
      if (!entity || !entity.polygon) return null;
      if (entity.footprintForSight) return entity.footprintForSight;
      return footprints.find(f => String(f.fid) === String(entity.fidValue)) || null;
    }

    function pointAtBearing(origin, bearingDeg, meters) {
      const rad = Cesium.Math.toRadians(bearingDeg);
      return {
        x: origin.x + Math.sin(rad) * meters,
        y: origin.y + Math.cos(rad) * meters
      };
    }

    function clampEyeFloor(footprint, value) {
      const maxFloor = Math.max(1, Math.round(footprint.floors || 1));
      const floor = Math.round(Number(value || 0));
      if (!Number.isFinite(floor) || floor < 1) return null;
      return Math.min(floor, maxFloor);
    }

    function selectedFloorForEntity(entity, footprint) {
      if (!footprint) return null;
      const inputFloor = eyeFloorInputEl ? clampEyeFloor(footprint, eyeFloorInputEl.value) : null;
      return inputFloor || Math.max(1, Math.round(footprint.floors || 1));
    }

    function floorViewForEntity(entity, forcedFloor = null) {
      const footprint = entity && entity.polygon
        ? (entity.footprintForSight || footprints.find(f => String(f.fid) === String(entity.fidValue)))
        : null;
      if (!entity || !footprint || !entity.fidValue) return null;
      const analysis = viewAnalysisByFid.get(String(entity.fidValue));
      if (!analysis || !analysis.candidateData) return null;
      const floor = forcedFloor || selectedFloorForEntity(entity, footprint);
      if (!floor) return null;
      const observerHeight = floorEyeHeight(footprint, floor);
      return {
        floor,
        footprint,
        analysis,
        view: summarizeFacadeCandidates(footprint, analysis.candidateData, observerHeight)
      };
    }

    function updateFloorTotalAngle(entity = viewer.selectedEntity) {
      if (!floorTotalAngleEl) return;
      const data = floorViewForEntity(entity);
      if (!data) {
        floorTotalAngleEl.textContent = "유닛 선택";
        return;
      }
      const props = propsFromEntity(entity);
      const dong = formatDong(props.dong).replace(/<[^>]*>/g, "");
      const unitType = String(props.unit_type || "").trim();
      const unitLabel = unitType ? ` ${unitType}PY` : "";
      floorTotalAngleEl.textContent = `${dong}${unitLabel} ${data.floor}층 총 ${Math.round(data.view.totalOpen)}도`;
    }

    function initialHeadingForOpenGap(gap, fallbackHeading) {
      if (!gap || !gap.start || !Number.isFinite(Number(gap.start.angle))) {
        return normalizeAngle(fallbackHeading);
      }
      const gapSize = Number(gap.size || 0);
      const insideOffset = Math.min(22, Math.max(6, gapSize * 0.18));
      return normalizeAngle(Number(gap.start.angle) + insideOffset);
    }

    function updateEyeFloorInput(entity) {
      const footprint = entity && entity.polygon
        ? (entity.footprintForSight || footprints.find(f => String(f.fid) === String(entity.fidValue)))
        : null;
      if (!eyeFloorInputEl) return;
      if (!footprint) {
        eyeFloorInputEl.value = "";
        eyeFloorInputEl.removeAttribute("max");
        updateFloorTotalAngle(null);
        return;
      }
      const maxFloor = Math.max(1, Math.round(footprint.floors || 1));
      eyeFloorInputEl.max = String(maxFloor);
      eyeFloorInputEl.value = String(clampEyeFloor(footprint, eyeFloorInputEl.value) || maxFloor);
      updateFloorTotalAngle(entity);
    }

    function startEyeLevelRotate() {
      const entity = viewer.selectedEntity;
      const footprint = selectedFootprintForEyeView();
      if (!entity || !footprint) {
        setStatus("먼저 눈높이 기준으로 볼 유닛을 클릭하세요.");
        return;
      }

      const floor = clampEyeFloor(footprint, eyeFloorInputEl ? eyeFloorInputEl.value : "");
      if (!floor) {
        setStatus("회전할 층수를 입력하세요.");
        return;
      }

      if (eyeFloorInputEl) eyeFloorInputEl.value = String(floor);
      const analysis = viewAnalysisByFid.get(String(entity.fidValue));
      const floorData = floorViewForEntity(entity, floor);
      const fallbackHeading = Number.isFinite(analysis && analysis.riverBearing)
        ? Number(analysis.riverBearing)
        : Cesium.Math.toDegrees(viewer.camera.heading || Cesium.Math.toRadians(335));
      const openGap = floorData ? largestGap(floorData.view.allOpenSummary) : null;
      const heading = initialHeadingForOpenGap(openGap, fallbackHeading);
      let eyeOrigin = footprint.center;
      let eyeOffsetHeading = heading;
      if (floorData) {
        const sightRay = representativeRayForGap({ allOpenRays: floorData.view.allOpenRays }, openGap);
        if (sightRay && sightRay.origin) {
          eyeOrigin = sightRay.origin;
          eyeOffsetHeading = sightRay.angle;
        } else if (floorData.view.visibleFacadeSegments && floorData.view.visibleFacadeSegments.length) {
          const segment = floorData.view.visibleFacadeSegments[0];
          eyeOrigin = {
            x: (segment.a.x + segment.b.x) / 2,
            y: (segment.a.y + segment.b.y) / 2
          };
        }
      }
      const eyePoint = pointAtBearing(eyeOrigin, eyeOffsetHeading, 18);
      const lonLat = xyToLonLat(eyePoint);
      const eyeHeight = floorEyeHeight(footprint, floor);

      autoRotateMode = "eye";
      autoRotateEyePosition = Cesium.Cartesian3.fromDegrees(lonLat.lon, lonLat.lat, eyeHeight);
      autoRotateCenter = null;
      autoRotateHeadingDeg = normalizeAngle(heading);
      autoRotatePitch = Cesium.Math.toRadians(-2);
      autoRotateLastMs = performance.now();
      autoRotateActive = true;
      enable3DControls();
      viewer.camera.lookAtTransform(Cesium.Matrix4.IDENTITY);
      drawSelectedSightLines(entity, floor);
      updateFloorTotalAngle(entity);
      viewer.camera.setView({
        destination: autoRotateEyePosition,
        orientation: {
          heading: Cesium.Math.toRadians(autoRotateHeadingDeg),
          pitch: autoRotatePitch,
          roll: 0
        }
      });
      if (eyeRotateFrameId !== null) cancelAnimationFrame(eyeRotateFrameId);
      eyeRotateFrameId = requestAnimationFrame(runEyeRotateFrame);
      setStatus(`${entity.name || "선택 유닛"} ${floor}층 눈높이 약 ${Math.round(eyeHeight)}m에서 360도 회전 중입니다.`);
    }

    viewer.clock.onTick.addEventListener(() => {
      if (!autoRotateActive) return;
      const now = performance.now();
      const deltaSeconds = autoRotateLastMs ? Math.min((now - autoRotateLastMs) / 1000, 0.1) : 0;
      autoRotateLastMs = now;
      autoRotateHeadingDeg = normalizeAngle(autoRotateHeadingDeg + AUTO_ROTATE_SPEED_DEG_PER_SEC * deltaSeconds);
      if (autoRotateMode === "eye" && autoRotateEyePosition) {
        viewer.camera.setView({
          destination: autoRotateEyePosition,
          orientation: {
            heading: Cesium.Math.toRadians(autoRotateHeadingDeg),
            pitch: autoRotatePitch,
            roll: 0
          }
        });
        return;
      }
      if (!autoRotateCenter) return;
      viewer.camera.lookAt(
        autoRotateCenter,
        new Cesium.HeadingPitchRange(
          Cesium.Math.toRadians(autoRotateHeadingDeg),
          autoRotatePitch,
          autoRotateRange
        )
      );
    });

    function colorFromHex(value, fallback, alpha) {
      const text = String(value || "").trim();
      if (/^#[0-9a-fA-F]{6}$/.test(text)) {
        return Cesium.Color.fromCssColorString(text).withAlpha(alpha);
      }
      if (/^[0-9a-fA-F]{6}$/.test(text)) {
        return Cesium.Color.fromCssColorString("#" + text).withAlpha(alpha);
      }
      return fallback.withAlpha(alpha);
    }

    function cssColorFromHex(value, fallback) {
      const text = String(value || "").trim();
      if (/^#[0-9a-fA-F]{6}$/.test(text)) return text;
      if (/^[0-9a-fA-F]{6}$/.test(text)) return "#" + text;
      return fallback;
    }

    const ORIGIN_LON = 127.03255;
    const ORIGIN_LAT = 37.52545;
    const METERS_PER_DEG_LAT = 110540;
    const METERS_PER_DEG_LON = 111320 * Math.cos(Cesium.Math.toRadians(ORIGIN_LAT));
    const EXTERIOR_HULL_TOLERANCE_M = 2;
    const FACADE_SAMPLE_STEP_M = 2;
    // 같은 동 보정: 평형별 유닛 사이에 생략된 외벽/코어를 계산용 외피로 닫는다.
    // 외피는 실제 유닛 라인에 최대한 붙이고, 유닛 사이의 최단거리만 보조 연결선으로 막는다.
    const SAME_DONG_NEAREST_BRIDGE_ENABLED = true;
    const SAME_DONG_NEAREST_BRIDGE_MAX_M = 18;
    const SAME_DONG_INTERNAL_RAY_EPS_M = 0.15;

    function lonLatToXY(lon, lat) {
      return {
        x: (lon - ORIGIN_LON) * METERS_PER_DEG_LON,
        y: (lat - ORIGIN_LAT) * METERS_PER_DEG_LAT
      };
    }

    function xyToLonLat(point) {
      return {
        lon: point.x / METERS_PER_DEG_LON + ORIGIN_LON,
        lat: point.y / METERS_PER_DEG_LAT + ORIGIN_LAT
      };
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function vectorLength(v) {
      return Math.hypot(v.x, v.y);
    }

    function dot(a, b) {
      return a.x * b.x + a.y * b.y;
    }

    function bearingTo(from, to) {
      const angle = Cesium.Math.toDegrees(Math.atan2(to.x - from.x, to.y - from.y));
      return (angle + 360) % 360;
    }

    function normalizeAngle(degrees) {
      return ((degrees % 360) + 360) % 360;
    }

    function bearingName(degrees) {
      const names = ["북", "북동", "동", "남동", "남", "남서", "서", "북서"];
      return names[Math.round((((degrees % 360) + 360) % 360) / 45) % 8];
    }

    function closestPointOnSegment(p, a, b) {
      const ab = { x: b.x - a.x, y: b.y - a.y };
      const len2 = ab.x * ab.x + ab.y * ab.y;
      if (len2 === 0) return a;
      const t = Math.max(0, Math.min(1, ((p.x - a.x) * ab.x + (p.y - a.y) * ab.y) / len2));
      return { x: a.x + ab.x * t, y: a.y + ab.y * t };
    }

    function closestPointOnPolyline(p, segments) {
      let best = null;
      for (const segment of segments) {
        const candidate = closestPointOnSegment(p, segment.a, segment.b);
        const d = distance(p, candidate);
        if (!best || d < best.distance) {
          best = { point: candidate, distance: d };
        }
      }
      return best;
    }

    function pointSegmentDistance(point, a, b) {
      return distance(point, closestPointOnSegment(point, a, b));
    }

    function segmentLength(segment) {
      return distance(segment.a, segment.b);
    }

    function valueBetween(value, endA, endB) {
      return value >= Math.min(endA, endB) - 1e-9 && value <= Math.max(endA, endB) + 1e-9;
    }

    function pointOnSegment(point, a, b) {
      return Math.abs(cross(a, b, point)) < 1e-9 &&
        valueBetween(point.x, a.x, b.x) &&
        valueBetween(point.y, a.y, b.y);
    }

    function segmentsIntersect(a, b, c, d) {
      const abC = cross(a, b, c);
      const abD = cross(a, b, d);
      const cdA = cross(c, d, a);
      const cdB = cross(c, d, b);
      if (Math.abs(abC) < 1e-9 && pointOnSegment(c, a, b)) return true;
      if (Math.abs(abD) < 1e-9 && pointOnSegment(d, a, b)) return true;
      if (Math.abs(cdA) < 1e-9 && pointOnSegment(a, c, d)) return true;
      if (Math.abs(cdB) < 1e-9 && pointOnSegment(b, c, d)) return true;
      return abC * abD < 0 && cdA * cdB < 0;
    }

    function segmentSegmentDistance(a, b, c, d) {
      if (segmentsIntersect(a, b, c, d)) return 0;
      return Math.min(
        pointSegmentDistance(a, c, d),
        pointSegmentDistance(b, c, d),
        pointSegmentDistance(c, a, b),
        pointSegmentDistance(d, a, b)
      );
    }

    function addCoreBridgeSegment(segments, a, b) {
      if (distance(a, b) < 0.5 || distance(a, b) > SAME_DONG_CORE_GAP_M) return;
      const key = segmentKey({ a, b });
      if (segments.has(key)) return;
      segments.set(key, { a, b, isCoreBridge: true });
    }

    function addCoreBridgeSamples(segments, sourceSegment, targetSegment) {
      const len = segmentLength(sourceSegment);
      if (!Number.isFinite(len) || len === 0) return;
      const count = Math.max(1, Math.ceil(len / SAME_DONG_CORE_BRIDGE_STEP_M));
      for (let i = 0; i <= count; i += 1) {
        const p = pointAlongSegment(sourceSegment.a, sourceSegment.b, i / count);
        const q = closestPointOnSegment(p, targetSegment.a, targetSegment.b);
        addCoreBridgeSegment(segments, p, q);
      }
    }

    function cross(o, a, b) {
      return (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
    }

    function convexHull(points) {
      const unique = [];
      const seen = new Set();
      for (const point of points) {
        const key = `${point.x.toFixed(3)},${point.y.toFixed(3)}`;
        if (!seen.has(key)) {
          seen.add(key);
          unique.push(point);
        }
      }
      if (unique.length <= 3) return unique;
      unique.sort((a, b) => a.x === b.x ? a.y - b.y : a.x - b.x);
      const lower = [];
      for (const point of unique) {
        while (lower.length >= 2 && cross(lower[lower.length - 2], lower[lower.length - 1], point) <= 0) {
          lower.pop();
        }
        lower.push(point);
      }
      const upper = [];
      for (let i = unique.length - 1; i >= 0; i -= 1) {
        const point = unique[i];
        while (upper.length >= 2 && cross(upper[upper.length - 2], upper[upper.length - 1], point) <= 0) {
          upper.pop();
        }
        upper.push(point);
      }
      lower.pop();
      upper.pop();
      return lower.concat(upper);
    }

    function segmentsFromPoints(points) {
      const segments = [];
      for (let i = 0; i < points.length; i += 1) {
        segments.push({ a: points[i], b: points[(i + 1) % points.length] });
      }
      return segments;
    }

    function pointKey(point) {
      return `${point.x.toFixed(3)},${point.y.toFixed(3)}`;
    }

    function segmentKey(segment) {
      const a = pointKey(segment.a);
      const b = pointKey(segment.b);
      return a < b ? `${a}|${b}` : `${b}|${a}`;
    }

    function exteriorSegmentsFromFootprints(groupFootprints) {
      const counts = new Map();
      const segmentsByKey = new Map();
      for (const footprint of groupFootprints || []) {
        for (const segment of footprint.segments || []) {
          const key = segmentKey(segment);
          counts.set(key, (counts.get(key) || 0) + 1);
          if (!segmentsByKey.has(key)) segmentsByKey.set(key, segment);
        }
      }
      return [...segmentsByKey.entries()]
        .filter(([key]) => counts.get(key) === 1)
        .map(([, segment]) => segment);
    }

    function exteriorSegmentItemsFromFootprints(groupFootprints) {
      const counts = new Map();
      const itemsByKey = new Map();
      for (const footprint of groupFootprints || []) {
        for (const segment of footprint.segments || []) {
          const key = segmentKey(segment);
          counts.set(key, (counts.get(key) || 0) + 1);
          if (!itemsByKey.has(key)) itemsByKey.set(key, { segment, footprint });
        }
      }
      return [...itemsByKey.entries()]
        .filter(([key]) => counts.get(key) === 1)
        .map(([, item]) => item);
    }

    function closestSegmentConnection(segmentA, segmentB) {
      if (!segmentA || !segmentB) return null;
      if (segmentsIntersect(segmentA.a, segmentA.b, segmentB.a, segmentB.b)) {
        return { distance: 0, a: segmentA.a, b: segmentA.a };
      }
      const candidates = [];
      const addCandidate = (p, q) => candidates.push({ a: p, b: q, distance: distance(p, q) });
      addCandidate(segmentA.a, closestPointOnSegment(segmentA.a, segmentB.a, segmentB.b));
      addCandidate(segmentA.b, closestPointOnSegment(segmentA.b, segmentB.a, segmentB.b));
      addCandidate(closestPointOnSegment(segmentB.a, segmentA.a, segmentA.b), segmentB.a);
      addCandidate(closestPointOnSegment(segmentB.b, segmentA.a, segmentA.b), segmentB.b);
      return candidates.reduce((best, candidate) => !best || candidate.distance < best.distance ? candidate : best, null);
    }

    function addNearestBridgeSegment(segments, a, b, maxGap = SAME_DONG_NEAREST_BRIDGE_MAX_M) {
      const gap = distance(a, b);
      if (gap < 0.5 || gap > maxGap) return false;
      const key = segmentKey({ a, b });
      if (segments.has(key)) return false;
      segments.set(key, { a, b, isCoreBridge: true, isNearestBridge: true });
      return true;
    }

    function coreBridgeSegmentsFromFootprints(groupFootprints) {
      const footprintsInGroup = (groupFootprints || []).filter(Boolean);
      const bridges = new Map();
      if (!SAME_DONG_NEAREST_BRIDGE_ENABLED || footprintsInGroup.length <= 1) return [];

      const pairBest = [];
      for (let i = 0; i < footprintsInGroup.length; i += 1) {
        for (let j = i + 1; j < footprintsInGroup.length; j += 1) {
          const source = footprintsInGroup[i];
          const target = footprintsInGroup[j];
          let best = null;
          for (const sourceSegment of source.segments || []) {
            for (const targetSegment of target.segments || []) {
              const connection = closestSegmentConnection(sourceSegment, targetSegment);
              if (!connection || connection.distance <= 0.5 || connection.distance > SAME_DONG_NEAREST_BRIDGE_MAX_M) continue;
              if (!best || connection.distance < best.distance) {
                best = { ...connection, source, target };
              }
            }
          }
          if (best) pairBest.push(best);
        }
      }

      // 각 유닛쌍마다 가장 가까운 지점만 연결한다.
      // 넓은 convex hull 외피가 유닛과 떨어져 조망각을 왜곡하는 문제를 피하기 위한 방식이다.
      pairBest.sort((a, b) => a.distance - b.distance);
      for (const candidate of pairBest) {
        addNearestBridgeSegment(bridges, candidate.a, candidate.b);
      }

      return [...bridges.values()];
    }

    function distanceToSegments(point, segments) {
      let best = Number.POSITIVE_INFINITY;
      for (const segment of segments || []) {
        best = Math.min(best, pointSegmentDistance(point, segment.a, segment.b));
      }
      return best;
    }

    function polylineLength(points) {
      let total = 0;
      for (let i = 0; i < points.length - 1; i += 1) {
        total += distance(points[i], points[i + 1]);
      }
      return total;
    }

    function extendEndpoint(endpoint, neighbor, meters) {
      const len = distance(endpoint, neighbor);
      if (!Number.isFinite(len) || len === 0 || meters <= 0) return endpoint;
      return {
        x: endpoint.x + ((endpoint.x - neighbor.x) / len) * meters,
        y: endpoint.y + ((endpoint.y - neighbor.y) / len) * meters
      };
    }

    function extendPolyline(points, meters) {
      if (!points || points.length < 2 || !Number.isFinite(meters) || meters <= 0) {
        return points.slice();
      }
      const extended = points.slice();
      extended[0] = extendEndpoint(points[0], points[1], meters);
      extended[extended.length - 1] = extendEndpoint(
        points[points.length - 1],
        points[points.length - 2],
        meters
      );
      return extended;
    }

    function getRiverExtendMeters() {
      if (!riverExtendInput) return 0;
      const value = Number(riverExtendInput.value);
      return Number.isFinite(value) && value > 0 ? value : 0;
    }

    function raySegmentDistance(origin, bearingDeg, a, b) {
      const rad = Cesium.Math.toRadians(bearingDeg);
      const d = { x: Math.sin(rad), y: Math.cos(rad) };
      const v = { x: b.x - a.x, y: b.y - a.y };
      const w = { x: a.x - origin.x, y: a.y - origin.y };
      const cross = d.x * v.y - d.y * v.x;
      if (Math.abs(cross) < 1e-9) return null;
      const t = (w.x * v.y - w.y * v.x) / cross;
      const u = (w.x * d.y - w.y * d.x) / cross;
      if (t >= 0 && u >= 0 && u <= 1) return t;
      return null;
    }

    function ringCentroid(ring) {
      let x = 0;
      let y = 0;
      for (const point of ring) {
        x += point.x;
        y += point.y;
      }
      return { x: x / ring.length, y: y / ring.length };
    }

    function ringSegments(ring) {
      const segments = [];
      for (let i = 0; i < ring.length; i += 1) {
        segments.push({ a: ring[i], b: ring[(i + 1) % ring.length], index: i });
      }
      return segments;
    }

    function pointInRing(point, ring) {
      let inside = false;
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i, i += 1) {
        const pi = ring[i];
        const pj = ring[j];
        const intersects = ((pi.y > point.y) !== (pj.y > point.y)) &&
          (point.x < ((pj.x - pi.x) * (point.y - pi.y)) / (pj.y - pi.y) + pi.x);
        if (intersects) inside = !inside;
      }
      return inside;
    }

    function pointAlongSegment(a, b, t) {
      return {
        x: a.x + (b.x - a.x) * t,
        y: a.y + (b.y - a.y) * t
      };
    }

    function sampleFacadeSegments(footprint, stepMeters = 5) {
      const samples = [];
      for (const segment of footprint.segments) {
        const len = distance(segment.a, segment.b);
        if (!Number.isFinite(len) || len === 0) continue;
        const count = Math.max(1, Math.ceil(len / stepMeters));
        for (let i = 0; i < count; i += 1) {
          const t0 = i / count;
          const t1 = (i + 1) / count;
          samples.push({
            point: pointAlongSegment(segment.a, segment.b, (t0 + t1) / 2),
            a: pointAlongSegment(segment.a, segment.b, t0),
            b: pointAlongSegment(segment.a, segment.b, t1),
            length: len / count,
            segmentIndex: segment.index
          });
        }
      }
      return samples;
    }

    function normalizeRing(coords) {
      const ring = coords.map(([lon, lat]) => lonLatToXY(lon, lat));
      const first = ring[0];
      const last = ring[ring.length - 1];
      if (first && last && first.x === last.x && first.y === last.y) {
        ring.pop();
      }
      return ring;
    }

    function prepareFootprints(geojson) {
      footprints = [];
      if (!geojson || !geojson.features) return;
      const dongPointGroups = new Map();
      const dongFootprintGroups = new Map();
      for (const feature of geojson.features) {
        const geometry = feature.geometry;
        const props = feature.properties || {};
        if (!geometry) continue;
        const rings = [];
        if (geometry.type === "Polygon") {
          rings.push(normalizeRing(geometry.coordinates[0]));
        } else if (geometry.type === "MultiPolygon") {
          for (const polygon of geometry.coordinates) {
            rings.push(normalizeRing(polygon[0]));
          }
        }
        for (const ring of rings) {
          const footprint = {
            fid: props.fid,
            zoneName: String(props.zone || props.source_zone || "").trim(),
            dong: props.dong,
            unitType: String(props.unit_type || "").trim(),
            floors: normalizedFloorCount(props),
            piloti: Number(props.piloti_m || 0),
            floorH: normalizedFloorHeight(props),
            height: Number(props.height_m || 0),
            totalHeight: totalBuildingHeight(props),
            ring,
            center: ringCentroid(ring),
            segments: ringSegments(ring)
          };
          footprint.groupKey = `${footprint.zoneName}:${footprint.dong || ""}`;
          footprints.push(footprint);

          const dongKey = footprint.groupKey;
          if (!dongPointGroups.has(dongKey)) dongPointGroups.set(dongKey, []);
          dongPointGroups.get(dongKey).push(...ring);
          if (!dongFootprintGroups.has(dongKey)) dongFootprintGroups.set(dongKey, []);
          dongFootprintGroups.get(dongKey).push(footprint);
        }
      }

      const dongExteriorSegments = new Map();
      const dongCoreBridgeSegments = new Map();
      for (const [dongKey, groupFootprints] of dongFootprintGroups.entries()) {
        dongExteriorSegments.set(dongKey, exteriorSegmentsFromFootprints(groupFootprints));
        dongCoreBridgeSegments.set(dongKey, coreBridgeSegmentsFromFootprints(groupFootprints));
      }

      for (const footprint of footprints) {
        const group = dongPointGroups.get(footprint.groupKey) || footprint.ring;
        footprint.groupCenter = ringCentroid(group);
        footprint.groupExteriorSegments = dongExteriorSegments.get(footprint.groupKey) || footprint.segments;
        footprint.groupCoreBridgeSegments = dongCoreBridgeSegments.get(footprint.groupKey) || [];
        footprint.groupBarrierSegments = [
          ...footprint.groupExteriorSegments,
          ...footprint.groupCoreBridgeSegments
        ];
      }
    }

    function buildRiverContext(geojson, extendMeters = 0) {
      const segments = [];
      const pointsForScan = [];
      const linesForDisplay = [];
      let sourceLength = 0;
      let analysisLength = 0;
      let lineCount = 0;
      if (!geojson || !geojson.features) {
        return {
          segments,
          points: pointsForScan,
          linesForDisplay,
          stats: {
            lineCount: 0,
            segmentCount: 0,
            pointCount: 0,
            sourceLength: 0,
            analysisLength: 0,
            extendMeters
          }
        };
      }
      for (const feature of geojson.features) {
        const geometry = feature.geometry;
        if (!geometry) continue;
        const lines = geometry.type === "LineString" ? [geometry.coordinates] : geometry.coordinates || [];
        for (const line of lines) {
          const sourcePoints = line.map(([lon, lat]) => lonLatToXY(lon, lat));
          if (sourcePoints.length < 2) continue;
          const points = extendPolyline(sourcePoints, extendMeters);
          lineCount += 1;
          sourceLength += polylineLength(sourcePoints);
          analysisLength += polylineLength(points);
          linesForDisplay.push(points.map(xyToLonLat));
          pointsForScan.push(...points);
          for (let i = 0; i < points.length - 1; i += 1) {
            const segment = { a: points[i], b: points[i + 1] };
            segments.push(segment);
            const segmentLength = distance(segment.a, segment.b);
            const samples = Math.max(1, Math.floor(segmentLength / 25));
            for (let j = 1; j < samples; j += 1) {
              const t = j / samples;
              pointsForScan.push({
                x: segment.a.x + (segment.b.x - segment.a.x) * t,
                y: segment.a.y + (segment.b.y - segment.a.y) * t
              });
            }
          }
        }
      }
      return {
        segments,
        points: pointsForScan,
        linesForDisplay,
        stats: {
          lineCount,
          segmentCount: segments.length,
          pointCount: pointsForScan.length,
          sourceLength,
          analysisLength,
          extendMeters
        }
      };
    }

    function prepareRiverSegments(geojson, extendMeters = 0) {
      const context = buildRiverContext(geojson, extendMeters);
      riverSegments = context.segments;
      riverPoints = context.points;
      riverLinesForDisplay = context.linesForDisplay;
      activeRiverSegments = riverSegments;
      activeRiverPoints = riverPoints;
      return context.stats;
    }

    function nearestRayHit(origin, bearing, segments) {
      let best = null;
      for (const segment of segments) {
        const t = raySegmentDistance(origin, bearing, segment.a, segment.b);
        if (t !== null && t > 0 && (!best || t < best.distance)) {
          best = { distance: t, segment };
        }
      }
      return best;
    }

    function rayReachesRiver(origin, bearing, expectedDistance) {
      const hit = nearestRayHit(origin, bearing, activeRiverSegments);
      if (!hit || !Number.isFinite(hit.distance)) return false;
      if (Number.isFinite(expectedDistance)) {
        return Math.abs(hit.distance - expectedDistance) <= 2.5;
      }
      return hit.distance > 2;
    }

    function blockerOcclusionHeight(footprint) {
      const baseHeight = Number(footprint.totalHeight || footprint.height || 0);
      const floorH = Number.isFinite(footprint.floorH) && footprint.floorH > 0 ? footprint.floorH : 3.692;
      return baseHeight + floorH * BLOCKER_PENTHOUSE_FLOORS;
    }

    function blockerOcclusionFloors(footprint) {
      return Number(footprint.floors || 0) + BLOCKER_PENTHOUSE_FLOORS;
    }

    function isSameDongFootprint(a, b) {
      const zoneA = normalizeZoneId(a && a.zoneName);
      const zoneB = normalizeZoneId(b && b.zoneName);
      const dongA = String((a && a.dong) || "").trim();
      const dongB = String((b && b.dong) || "").trim();
      return !!dongA && !!dongB && zoneA === zoneB && dongA === dongB;
    }

    function rayHitsSameDongCoreBridge(origin, bearing, maxDistance, sourceFootprint) {
      for (const segment of sourceFootprint.groupCoreBridgeSegments || []) {
        const t = raySegmentDistance(origin, bearing, segment.a, segment.b);
        if (t !== null && t > SAME_DONG_INTERNAL_RAY_EPS_M && t < maxDistance) return true;
      }
      return false;
    }

    function rayBlockerProfile(origin, bearing, maxDistance, sourceFootprint) {
      // 같은 동 내부: 유닛 사이 최근접 연결 외피 또는 같은 동의 다른 유닛 경계선을 만나면 내부 관통으로 제외한다.
      let internalBlocked = rayHitsSameDongCoreBridge(origin, bearing, maxDistance, sourceFootprint);
      const hits = [];
      const checkedBarrierGroups = new Set();

      for (const footprint of footprints) {
        if (String(footprint.fid) === String(sourceFootprint.fid)) continue;

        if (isSameDongFootprint(footprint, sourceFootprint)) {
          for (const segment of footprint.segments || []) {
            const t = raySegmentDistance(origin, bearing, segment.a, segment.b);
            if (t !== null && t > SAME_DONG_INTERNAL_RAY_EPS_M && t < maxDistance) {
              internalBlocked = true;
              break;
            }
          }
          continue;
        }

        // 다른 동은 개별 유닛 경계뿐 아니라 같은동 보정 외피 전체를 차폐체로 사용한다.
        // 같은 동 그룹에 속한 여러 유닛이 같은 외피를 공유하므로 groupKey 기준으로 한 번만 검사한다.
        const groupKey = footprint.groupKey || `${footprint.zoneName}:${footprint.dong || ""}`;
        if (checkedBarrierGroups.has(groupKey)) continue;
        checkedBarrierGroups.add(groupKey);

        for (const segment of footprint.groupBarrierSegments || footprint.segments || []) {
          const t = raySegmentDistance(origin, bearing, segment.a, segment.b);
          if (t === null || t <= 2 || t >= maxDistance) continue;

          hits.push({
            zoneName: footprint.zoneName,
            dong: footprint.dong,
            unitType: footprint.unitType,
            distance: t,
            height: blockerOcclusionHeight(footprint),
            floors: blockerOcclusionFloors(footprint)
          });
        }
      }

      hits.sort((a, b) => a.distance - b.distance);
      let maxBlockerHeight = 0;
      const effectiveBlockers = [];
      for (const hit of hits) {
        if (hit.height > maxBlockerHeight) {
          maxBlockerHeight = hit.height;
          effectiveBlockers.push(hit);
        }
      }

      return {
        internalBlocked,
        maxBlockerHeight,
        blockers: effectiveBlockers
      };
    }

    function floorEyeHeight(footprint, floor) {
      const piloti = Number.isFinite(footprint.piloti) ? footprint.piloti : 0;
      const floorH = Number.isFinite(footprint.floorH) && footprint.floorH > 0 ? footprint.floorH : 3.3;
      const raw = piloti + Math.max(0, floor - 0.5) * floorH;
      const capHeight = Number(footprint.totalHeight || footprint.height || 0);
      return capHeight > 0 ? Math.min(raw, capHeight + 1.5) : raw;
    }

    function viewRayLeavesBuilding(samplePoint, targetPoint, footprint) {
      const d = distance(samplePoint, targetPoint);
      if (!Number.isFinite(d) || d === 0) return false;
      const testPoint = {
        x: samplePoint.x + ((targetPoint.x - samplePoint.x) / d) * 0.8,
        y: samplePoint.y + ((targetPoint.y - samplePoint.y) / d) * 0.8
      };
      if (pointInRing(testPoint, footprint.ring)) return false;

      // 선택 유닛의 조망각은 실제 유닛 외곽선에서 출발한다.
      // 단, 같은 동 보정 외피와 동떨어진 내부 경계/코어 방향 선은 조망 후보에서 제외한다.
      return distanceToSegments(samplePoint, footprint.groupBarrierSegments || footprint.groupExteriorSegments) <= EXTERIOR_HULL_TOLERANCE_M;
    }

    function addRayToCollections(ray, openByDirection, openRaysByDirection, allOpenRays) {
      const directionName = bearingName(ray.angle);
      allOpenRays.push(ray);
      if (!openRaysByDirection[directionName]) openRaysByDirection[directionName] = [];
      openRaysByDirection[directionName].push(ray);
      if (!openByDirection[directionName]) openByDirection[directionName] = [];
      openByDirection[directionName].push(ray);
    }

    function isBetterAngleProfile(candidate, current) {
      if (!current) return true;
      const candidateHeight = Number(candidate.blockerHeight || 0);
      const currentHeight = Number(current.blockerHeight || 0);
      if (candidateHeight !== currentHeight) return candidateHeight < currentHeight;
      return Number(candidate.distance || 0) < Number(current.distance || 0);
    }

    function buildAngleProfiles(candidates) {
      const byAngle = new Map();
      for (const candidate of candidates) {
        if (!byAngle.has(candidate.angle)) byAngle.set(candidate.angle, []);
        byAngle.get(candidate.angle).push(candidate);
      }

      return [...byAngle.entries()]
        .map(([angle, angleCandidates]) => {
          const representative = angleCandidates.reduce((best, candidate) =>
            isBetterAngleProfile(candidate, best) ? candidate : best, null);
          const maxBlockerHeight = angleCandidates.reduce((maxHeight, candidate) =>
            Math.max(maxHeight, Number(candidate.blockerHeight || 0)), 0);
          return {
            angle,
            order: angle,
            distance: representative.distance,
            origin: representative.origin,
            end: representative.end,
            blockerHeight: maxBlockerHeight,
            blockers: representative.blockers,
            sample: representative.sample,
            candidates: angleCandidates
          };
        })
        .sort((a, b) => a.order - b.order);
    }

    function firstBlockingBlocker(blockers, observerHeight) {
      return (blockers || [])
        .slice()
        .sort((a, b) => a.distance - b.distance)
        .find(blocker => blocker.height >= observerHeight && blocker.floors > 0) || null;
    }

    function openCandidatesForFloor(profile, observerHeight) {
      const candidates = profile.candidates || [profile];
      return candidates.filter(candidate =>
        Number(candidate.blockerHeight || 0) < observerHeight
      );
    }

    function openCandidateForFloor(profile, observerHeight) {
      const candidates = profile.candidates || [profile];
      if (!candidates.length) return null;
      const openCandidates = openCandidatesForFloor(profile, observerHeight);
      if ((openCandidates.length / candidates.length) < ANGLE_OPEN_RATIO_THRESHOLD) return null;
      return openCandidates.reduce((best, candidate) =>
        isBetterAngleProfile(candidate, best) ? candidate : best, null);
    }

    function blockingBlockerForFloor(profile, observerHeight) {
      const candidates = profile.candidates || [profile];
      const blockers = [];
      for (const candidate of candidates) {
        if (Number(candidate.blockerHeight || 0) >= observerHeight) {
          blockers.push(...(candidate.blockers || []));
        }
      }
      return firstBlockingBlocker(blockers, observerHeight);
    }

    function collectFacadeCandidates(footprint) {
      const samples = sampleFacadeSegments(footprint, FACADE_SAMPLE_STEP_M);
      const blockers = new Map();
      const candidates = [];

      for (const sample of samples) {
        for (const target of activeRiverPoints) {
          if (!viewRayLeavesBuilding(sample.point, target, footprint)) continue;
          const exactAngle = bearingTo(sample.point, target);
          const angle = normalizeAngle(Math.round(exactAngle));
          const targetDistance = distance(sample.point, target);
          if (!rayReachesRiver(sample.point, exactAngle, targetDistance)) continue;
          const blockerProfile = rayBlockerProfile(sample.point, exactAngle, targetDistance, footprint);
          if (blockerProfile.internalBlocked) continue;

          for (const blocker of blockerProfile.blockers) {
            const key = `${blocker.zoneName || ""}:${blocker.dong}동`;
            const current = blockers.get(key);
            if (!current || blocker.distance < current.distance) blockers.set(key, blocker);
          }

          candidates.push({
            angle,
            distance: targetDistance,
            origin: sample.point,
            end: target,
            blockerHeight: blockerProfile.maxBlockerHeight,
            blockers: blockerProfile.blockers,
            sample
          });
        }
      }

      return {
        samples,
        candidates,
        angleProfiles: buildAngleProfiles(candidates),
        blockers: [...blockers.values()].sort((a, b) => a.distance - b.distance)
      };
    }

    function summarizeFacadeCandidates(footprint, candidateData, observerHeight) {
      const openByDirection = {};
      const openRaysByDirection = {};
      const allOpenRays = [];
      const potentialAngles = new Set();
      const visibleFacadeSegments = [];
      const visibleSamples = new Set();
      const blockingFloorSet = new Set();
      const blockingBlockers = new Map();
      let visibleFacadeLength = 0;
      let visibleSampleCount = 0;

      const angleProfiles = candidateData.angleProfiles || [];

      for (const profile of angleProfiles) {
        potentialAngles.add(profile.angle);
        const candidates = profile.candidates || [profile];
        const openCandidates = openCandidatesForFloor(profile, observerHeight);
        if (!openCandidates.length || (openCandidates.length / candidates.length) < ANGLE_OPEN_RATIO_THRESHOLD) {
          const activeBlocker = blockingBlockerForFloor(profile, observerHeight);
          if (activeBlocker) {
            blockingFloorSet.add(Math.round(activeBlocker.floors));
            const key = `${activeBlocker.zoneName || ""}:${activeBlocker.dong || ""}`;
            if (!blockingBlockers.has(key)) blockingBlockers.set(key, activeBlocker);
          }
          continue;
        }

        for (const openCandidate of openCandidates) {
          const ray = {
            angle: profile.angle,
            order: profile.angle,
            distance: openCandidate.distance,
            origin: openCandidate.origin,
            end: openCandidate.end,
            sample: openCandidate.sample
          };
          addRayToCollections(ray, openByDirection, openRaysByDirection, allOpenRays);

          if (!visibleSamples.has(openCandidate.sample)) {
            visibleSamples.add(openCandidate.sample);
            visibleSampleCount += 1;
            visibleFacadeLength += openCandidate.sample.length;
            visibleFacadeSegments.push({
              a: openCandidate.sample.a,
              b: openCandidate.sample.b
            });
          }
        }
      }

      const directionSummaries = {};
      for (const [directionName, rays] of Object.entries(openByDirection)) {
        directionSummaries[directionName] = summarizeOpenGaps(rays.sort((a, b) => a.order - b.order));
      }

      const potentialRays = [...potentialAngles]
        .sort((a, b) => a - b)
        .map(angle => ({ angle, order: angle, distance: 0 }));
      const targetSummary = summarizeOpenGaps(potentialRays);
      const allOpenSummary = summarizeOpenGaps(allOpenRays.sort((a, b) => a.order - b.order));

      return {
        openByDirection: directionSummaries,
        openRaysByDirection,
        allOpenSummary,
        allOpenRays,
        totalOpen: allOpenSummary.total,
        targetSpan: targetSummary.total,
        observerHeight,
        visibleFacadeLength,
        visibleFacadeSegments,
        visibleSampleCount,
        sampleCount: candidateData.samples.length,
        blockingFloors: [...blockingFloorSet].sort((a, b) => a - b),
        blockingBlockers: [...blockingBlockers.values()].sort((a, b) => a.distance - b.distance),
        blockers: candidateData.blockers
      };
    }

    function blockerCauseKey(blocker, angle) {
      return [
        blocker.zoneName || "",
        blocker.dong || "",
        blocker.unitType || "",
        Math.round(Number(blocker.height || 0) * 10) / 10,
        Math.round(Number(blocker.distance || 0)),
        angle
      ].join(":");
    }

    function explainFloorTransition(candidateData, previousSummary, nextSummary, transitionFloor) {
      if (!candidateData || !previousSummary || !nextSummary) return null;
      const previousOpenAngles = new Set((previousSummary.allOpenRays || []).map(ray => ray.angle));
      const nextOpenAngles = new Set((nextSummary.allOpenRays || []).map(ray => ray.angle));
      const causes = [];
      const seen = new Set();

      for (const profile of candidateData.angleProfiles || []) {
        if (previousOpenAngles.has(profile.angle) || !nextOpenAngles.has(profile.angle)) continue;
        const blocker = blockingBlockerForFloor(profile, previousSummary.observerHeight);
        if (!blocker) continue;
        const key = blockerCauseKey(blocker, profile.angle);
        if (seen.has(key)) continue;
        seen.add(key);
        causes.push({
          ...blocker,
          angle: profile.angle
        });
      }

      if (!causes.length && previousSummary.blockingBlockers && previousSummary.blockingBlockers.length) {
        for (const blocker of previousSummary.blockingBlockers.slice(0, 3)) {
          const key = blockerCauseKey(blocker, "");
          if (seen.has(key)) continue;
          seen.add(key);
          causes.push({ ...blocker, angle: null });
        }
      }

      if (!causes.length) return null;
      causes.sort((a, b) => {
        const heightDiff = Number(a.height || 0) - Number(b.height || 0);
        if (heightDiff !== 0) return heightDiff;
        return Number(a.distance || 0) - Number(b.distance || 0);
      });

      return {
        floor: transitionFloor,
        fromAngle: previousSummary.totalOpen,
        toAngle: nextSummary.totalOpen,
        observerHeight: nextSummary.observerHeight,
        blockers: causes.slice(0, 3)
      };
    }

    function buildFloorBands(footprint, candidateData) {
      const floorCount = Math.max(1, Math.round(footprint.floors || 1));
      const bands = [];
      let previous = null;

      for (let floor = 1; floor <= floorCount; floor += 1) {
        const summary = summarizeFacadeCandidates(footprint, candidateData, floorEyeHeight(footprint, floor));
        const comparable = {
          totalOpen: summary.totalOpen
        };

        if (!previous) {
          previous = { start: floor, end: floor, comparable, summary };
          continue;
        }

        const same = comparable.totalOpen === previous.comparable.totalOpen;

        if (same) {
          previous.end = floor;
        } else {
          bands.push(previous);
          previous = {
            start: floor,
            end: floor,
            comparable,
            summary,
            transitionCause: explainFloorTransition(candidateData, previous.summary, summary, floor)
          };
        }
      }

      if (previous) bands.push(previous);
      return bands;
    }

    function clearSelectedSightLines() {
      while (selectedSightEntities.length) {
        viewer.entities.remove(selectedSightEntities.pop());
      }
    }

    function largestGap(summary) {
      if (!summary || !summary.gaps || !summary.gaps.length) return null;
      return summary.gaps
        .slice()
        .sort((a, b) => b.size - a.size)[0];
    }

    function formatAngleRange(summary) {
      const gap = largestGap(summary);
      if (!gap) return "없음";
      return `${Math.round(gap.start.angle)}도 ~ ${Math.round(gap.end.angle)}도 (${gap.size}도)`;
    }

    function angleWithinGap(angle, gap) {
      if (!gap) return false;
      const start = normalizeAngle(gap.start.angle);
      const end = normalizeAngle(gap.end.angle);
      const value = normalizeAngle(angle);
      return start <= end ? value >= start && value <= end : value >= start || value <= end;
    }

    function representativeRayForGap(analysis, gap) {
      const rays = (analysis.allOpenRays || [])
        .filter(ray => angleWithinGap(ray.angle, gap))
        .sort((a, b) => a.distance - b.distance);
      if (!rays.length) return null;
      return rays[Math.floor(rays.length / 2)];
    }

    function rayEndFromOrigin(origin, angle, fallbackDistance) {
      const hit = nearestRayHit(origin, angle, activeRiverSegments);
      const d = hit && Number.isFinite(hit.distance) ? hit.distance : fallbackDistance;
      const rad = Cesium.Math.toRadians(angle);
      return {
        x: origin.x + Math.sin(rad) * d,
        y: origin.y + Math.cos(rad) * d
      };
    }

    function summarizeOpenGaps(openRays) {
      if (!openRays.length) {
        return { total: 0, gapCount: 0, maxGap: 0, gaps: [] };
      }
      const buildGap = (start, end, rays) => {
        const distances = rays.map(ray => ray.distance).filter(value => Number.isFinite(value));
        const distanceMin = distances.length ? Math.min(...distances) : 0;
        const distanceMax = distances.length ? Math.max(...distances) : 0;
        const distanceAvg = distances.length
          ? distances.reduce((sum, value) => sum + value, 0) / distances.length
          : 0;
        return {
          start,
          end,
          size: Math.round(end.order - start.order + 1),
          distanceMin,
          distanceMax,
          distanceAvg
        };
      };
      const gaps = [];
      let start = openRays[0];
      let prev = openRays[0];
      let currentRays = [openRays[0]];
      for (let i = 1; i < openRays.length; i += 1) {
        const ray = openRays[i];
        const diff = ((ray.order - prev.order) + 360) % 360;
        if (diff <= 1.01) {
          currentRays.push(ray);
          prev = ray;
        } else {
          gaps.push(buildGap(start, prev, currentRays));
          start = ray;
          prev = ray;
          currentRays = [ray];
        }
      }
      gaps.push(buildGap(start, prev, currentRays));
      if (
        gaps.length > 1 &&
        gaps[0].start.order === 0 &&
        gaps[gaps.length - 1].end.order === 359
      ) {
        const first = gaps.shift();
        const last = gaps.pop();
        gaps.unshift({
          start: last.start,
          end: first.end,
          size: last.size + first.size,
          distanceMin: Math.min(last.distanceMin, first.distanceMin),
          distanceMax: Math.max(last.distanceMax, first.distanceMax),
          distanceAvg: (last.distanceAvg + first.distanceAvg) / 2
        });
      }
      const total = gaps.reduce((sum, gap) => sum + gap.size, 0);
      const maxGap = gaps.reduce((max, gap) => Math.max(max, gap.size), 0);
      return { total, gapCount: gaps.length, maxGap, gaps };
    }

    function angularScanForRiver(origin) {
      const bearings = activeRiverPoints
        .map(point => bearingTo(origin, point))
        .filter(value => Number.isFinite(value))
        .sort((a, b) => a - b);
      if (!bearings.length) return { angles: [], targetSpan: 0, start: null, end: null };
      if (bearings.length === 1) {
        const angle = Math.round(bearings[0]);
        return { angles: [angle], targetSpan: 1, start: angle, end: angle };
      }

      let largestGap = -1;
      let gapIndex = 0;
      for (let i = 0; i < bearings.length; i += 1) {
        const current = bearings[i];
        const next = bearings[(i + 1) % bearings.length] + (i === bearings.length - 1 ? 360 : 0);
        const gap = next - current;
        if (gap > largestGap) {
          largestGap = gap;
          gapIndex = i;
        }
      }

      const start = bearings[(gapIndex + 1) % bearings.length];
      const end = bearings[gapIndex];
      const span = Math.max(0, 360 - largestGap);
      const angles = [];
      const seen = new Set();
      for (let offset = 0; offset <= span; offset += 1) {
        const angle = (Math.round(start + offset) + 360) % 360;
        if (!seen.has(angle)) {
          seen.add(angle);
          angles.push(angle);
        }
      }
      return { angles, targetSpan: Math.round(span), start, end };
    }

    function normalizeZoneId(value) {
      const text = String(value || "").trim();
      if (text.includes("2")) return "2";
      if (text.includes("3")) return "3";
      if (text.includes("4")) return "4";
      if (text.includes("5")) return "5";
      return text;
    }

    function normalizedFloorCount(props) {
      return Number(props.floors || 0);
    }

    function normalizedFloorHeight(props) {
      const raw = Number(props.floor_h);
      if (Number.isFinite(raw) && raw > 0 && raw < 20) return raw;
      if (Number.isFinite(raw) && raw >= 1000 && raw < 10000) return raw / 1000;
      const zoneId = normalizeZoneId(props.zone || props.source_zone || "");
      if (zoneId === "2" || zoneId === "3") return 3.692;
      const floors = normalizedFloorCount(props);
      const height = Number(props.height_m || props.height || 0);
      if (floors > 0 && height > 0) return height / floors;
      return 3.692;
    }

    function totalBuildingHeight(props) {
      const floors = normalizedFloorCount(props);
      const floorH = normalizedFloorHeight(props);
      const piloti = Number(props.piloti_m || 0);
      const height = Number(props.height_m || props.height || 0);
      if (floors > 0 && floorH > 0) {
        return floors * floorH + piloti;
      }
      if (Number.isFinite(height) && height > 0) {
        return height + piloti;
      }
      return 20;
    }

    function riverContextForFootprint(footprint) {
      const zoneId = normalizeZoneId(footprint.zoneName);
      return riverContextsByZone.get(zoneId) || {
        segments: riverSegments,
        points: riverPoints,
        linesForDisplay: riverLinesForDisplay,
        stats: lastRiverStats
      };
    }

    function zoneIdFromProps(props) {
      return normalizeZoneId((props && (props.zone || props.source_zone)) || "");
    }

    function zoneIdFromEntity(entity) {
      if (!entity) return "";
      const props = entity.polygon ? propsFromEntity(entity) : {};
      return normalizeZoneId(props.zone || props.source_zone || entity.zoneName || "");
    }

    function resetViewAnalysisCache() {
      viewAnalysisByFid.clear();
      calculatedZones.clear();
      calculatingZonePromises.clear();
      zoneCalculationQueue = Promise.resolve();
    }

    function zoneLabelForStatus(zoneId) {
      const normalizedZoneId = normalizeZoneId(zoneId);
      if (!normalizedZoneId || normalizedZoneId === "ALL") return "전체";
      return `${normalizedZoneId}구역`;
    }

    function targetFootprintsForZone(zoneId) {
      const normalizedZoneId = normalizeZoneId(zoneId);
      if (!normalizedZoneId || normalizedZoneId === "ALL") return footprints.slice();
      return footprints.filter(footprint => normalizeZoneId(footprint.zoneName) === normalizedZoneId);
    }

    function storeViewAnalysisForFootprint(footprint) {
      const riverContext = riverContextForFootprint(footprint);
      if (!riverContext || !riverContext.segments.length || !riverContext.points.length) return false;

      activeRiverSegments = riverContext.segments;
      activeRiverPoints = riverContext.points;
      const closest = closestPointOnPolyline(footprint.center, activeRiverSegments);
      const direction = closest ? bearingTo(footprint.center, closest.point) : null;
      const candidateData = collectFacadeCandidates(footprint);
      const floorBands = buildFloorBands(footprint, candidateData);
      const displayFloor = Math.max(1, Math.round(footprint.floors || 1));
      const facadeView = summarizeFacadeCandidates(
        footprint,
        candidateData,
        floorEyeHeight(footprint, displayFloor)
      );
      const totalOpen = facadeView.totalOpen;
      const grade = totalOpen >= 60 ? "전면 조망" :
        totalOpen >= 30 ? "양호한 부분 조망" :
        totalOpen >= 10 ? "틈새 조망" :
        facadeView.visibleFacadeLength > 0 ? "제한적 조망" : "차폐";

      viewAnalysisByFid.set(String(footprint.fid), {
        riverDistance: closest ? closest.distance : null,
        riverBearing: direction,
        riverBearingName: direction === null ? "" : bearingName(direction),
        targetSpan: facadeView.targetSpan,
        openByDirection: facadeView.openByDirection,
        openRaysByDirection: facadeView.openRaysByDirection,
        allOpenSummary: facadeView.allOpenSummary,
        allOpenRays: facadeView.allOpenRays,
        totalOpen,
        visibleFacadeLength: facadeView.visibleFacadeLength,
        visibleFacadeSegments: facadeView.visibleFacadeSegments,
        visibleSampleCount: facadeView.visibleSampleCount,
        sampleCount: facadeView.sampleCount,
        candidateData,
        floorBands,
        displayFloor,
        displayEyeHeight: facadeView.observerHeight,
        blockers: facadeView.blockers.slice(0, 3),
        grade
      });
      return true;
    }

    async function runZoneAnalysis(zoneId, options = {}) {
      const normalizedZoneId = normalizeZoneId(zoneId);
      const cacheKey = normalizedZoneId || "ALL";
      const force = !!options.force;
      if (!force && calculatedZones.has(cacheKey)) return;
      if (!riverSegments.length || !footprints.length) return;

      const targetFootprints = targetFootprintsForZone(cacheKey);
      const label = zoneLabelForStatus(cacheKey);
      if (!targetFootprints.length) {
        setStatus(`${label} 계산 대상 유닛이 없습니다.`);
        return;
      }

      const startMs = performance.now();
      let completed = 0;
      let analyzed = 0;
      setStatus(`${label} 조망 계산 중... 0/${targetFootprints.length}`);

      for (const footprint of targetFootprints) {
        if (storeViewAnalysisForFootprint(footprint)) analyzed += 1;
        completed += 1;
        if (completed % 2 === 0 || completed === targetFootprints.length) {
          setStatus(`${label} 조망 계산 중... ${completed}/${targetFootprints.length}`);
          await new Promise(resolve => requestAnimationFrame(resolve));
        }
      }

      activeRiverSegments = riverSegments;
      activeRiverPoints = riverPoints;
      calculatedZones.add(cacheKey);
      refreshLoadedDescriptions();
      const seconds = ((performance.now() - startMs) / 1000).toFixed(1);
      setStatus(`${label} 조망 계산 완료\n계산 유닛: ${analyzed}/${targetFootprints.length}\n소요: ${seconds}초`);
    }

    function analyzeViewsForZone(zoneId, options = {}) {
      const normalizedZoneId = normalizeZoneId(zoneId);
      const cacheKey = normalizedZoneId || "ALL";
      if (!options.force && calculatedZones.has(cacheKey)) {
        return Promise.resolve();
      }
      if (calculatingZonePromises.has(cacheKey)) {
        return calculatingZonePromises.get(cacheKey);
      }

      const promise = zoneCalculationQueue
        .then(() => runZoneAnalysis(cacheKey, options))
        .finally(() => calculatingZonePromises.delete(cacheKey));
      calculatingZonePromises.set(cacheKey, promise);
      zoneCalculationQueue = promise.catch(() => {});
      return promise;
    }

    function clearOutlines() {
      while (overlayEntities.length) {
        viewer.entities.remove(overlayEntities.pop());
      }
    }

    function clearRiverLines() {
      while (riverLineEntities.length) {
        viewer.entities.remove(riverLineEntities.pop());
      }
    }

    function drawRiverLines() {
      clearRiverLines();
      for (const line of riverLinesForDisplay) {
        if (!line || line.length < 2) continue;

        for (const point of line) {
          degrees.push(point.lon, point.lat, 3);

          name: "조망 계산용 한강라인",

          }

    function candidateEntryForFid(fid) {
      if (!CANDIDATE_CONFIG || !CANDIDATE_CONFIG.enabled) return null;
      const target = String(fid == null ? "" : fid);
      return (CANDIDATE_CONFIG.entries || []).find(item => String(item.fid) === target) || null;
