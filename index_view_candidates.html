    function configureCandidateHeader() {
      if (!CANDIDATE_CONFIG || !CANDIDATE_CONFIG.enabled) return;
      if (mapMainTitleEl) mapMainTitleEl.textContent = CANDIDATE_CONFIG.title || "조망후보";
      if (candidateSummaryEl) {
        const entries = CANDIDATE_CONFIG.entries || [];
        const byPyeong = new Map();
        for (const item of entries) {
          const key = String(item.pyeong || "후보");
          byPyeong.set(key, (byPyeong.get(key) || 0) + 1);
        }
        candidateSummaryEl.innerHTML = [...byPyeong.entries()]
          .map(([pyeong, count]) => `${escapeHtml(pyeong)} 유닛 ${count}개 · 각 ${count ? (100 / count).toFixed(1) : "0.0"}%`)
          .join("<br>");
        candidateSummaryEl.hidden = false;
      }
    }

    function applyCandidatePresentation() {
      if (!CANDIDATE_CONFIG || !CANDIDATE_CONFIG.enabled || !unitsDataSource) return [];
      const candidateFids = new Set((CANDIDATE_CONFIG.entries || []).map(item => String(item.fid)));
      const candidates = [];

      for (const entity of unitsDataSource.entities.values) {
        if (!entity.polygon) continue;
        const entry = candidateEntryForFid(entity.fidValue);
        const selected = Boolean(entry);
        entity.show = true;
        entity.polygon.material = entity.baseColor.withAlpha(selected ? 1.0 : 0.06);
        if (selected) {
          entity.candidateEntry = entry;
          candidates.push(entity);
        }
      }

      for (const overlay of overlayEntities) {
        const entry = candidateEntryForFid(overlay.fidValue);
        overlay.show = Boolean(entry);
        if (entry && overlay.label) {
          overlay.label.text = `${entry.unitType || entry.pyeong}\n배정확률 ${Number(entry.probability).toFixed(1)}%`;
          overlay.label.font = "bold 16px Arial, Malgun Gothic, sans-serif";
          overlay.label.fillColor = Cesium.Color.fromCssColorString("#7c2d12");
          overlay.label.outlineColor = Cesium.Color.WHITE;
          overlay.label.outlineWidth = 4;
          overlay.label.showBackground = true;
          overlay.label.backgroundColor = Cesium.Color.fromCssColorString("#fffbeb").withAlpha(0.88);
          overlay.label.backgroundPadding = new Cesium.Cartesian2(7, 5);
        }
      }

      currentFilter = "CANDIDATES";
      if (legendEl) legendEl.innerHTML = "";
      return candidates;
    }

    function addSharpOutlineAndLabel(entity, height, labelText, unitType, filterKey = unitType, fidValue = "") {
      const hierarchy = entity.polygon.hierarchy && entity.polygon.hierarchy.getValue(Cesium.JulianDate.now());
      if (!hierarchy || !hierarchy.positions) return;

      const outlineColor = Cesium.Color.fromCssColorString("#2f343a").withAlpha(0.95);
      const positions = hierarchy.positions.concat([hierarchy.positions[0]]);
      const topDegrees = [];
      let lonSum = 0;
      let latSum = 0;
      for (const position of positions) {
        const cartographic = Cesium.Cartographic.fromCartesian(position);
        const lon = Cesium.Math.toDegrees(cartographic.longitude);
        const lat = Cesium.Math.toDegrees(cartographic.latitude);
        topDegrees.push(lon);
        topDegrees.push(lat);
        topDegrees.push(height);
      }
      for (const position of hierarchy.positions) {
        const cartographic = Cesium.Cartographic.fromCartesian(position);
        lonSum += Cesium.Math.toDegrees(cartographic.longitude);
        latSum += Cesium.Math.toDegrees(cartographic.latitude);
      }
      const centerLon = lonSum / hierarchy.positions.length;
      const centerLat = latSum / hierarchy.positions.length;

      const bottomOutline = viewer.entities.add({
        name: `${entity.name} 외곽선`,
        unitType: filterKey,
        fidValue,
        polyline: {
          positions,
          width: 1,
          material: outlineColor,
          clampToGround: false
        }
      });
      overlayEntities.push(bottomOutline);

      const topOutline = viewer.entities.add({
        name: `${entity.name} 상단 외곽선`,
        unitType: filterKey,
        fidValue,
        polyline: {
          positions: Cesium.Cartesian3.fromDegreesArrayHeights(topDegrees),
          width: 1,
          material: outlineColor,
          clampToGround: false
        }
      });
      overlayEntities.push(topOutline);

      const groundPositions = hierarchy.positions;
      for (let i = 0; i < groundPositions.length; i += 1) {
        const cartographic = Cesium.Cartographic.fromCartesian(groundPositions[i]);
        const lon = Cesium.Math.toDegrees(cartographic.longitude);
        const lat = Cesium.Math.toDegrees(cartographic.latitude);
        const sideOutline = viewer.entities.add({
          unitType: filterKey,
          fidValue,
          polyline: {
            positions: Cesium.Cartesian3.fromDegreesArrayHeights([
              lon, lat, 0,
              lon, lat, height
            ]),
            width: 1,
            material: outlineColor,
              clampToGround: false
            }
        });
        overlayEntities.push(sideOutline);
      }

      if (labelText) {
        const labelEntity = viewer.entities.add({
          name: `${entity.name} 라벨`,
          unitType: filterKey,
          fidValue,
          position: Cesium.Cartesian3.fromDegrees(centerLon, centerLat, height + 2),
          label: {
            text: labelText,
            font: "bold 15px Arial, Malgun Gothic, sans-serif",
            fillColor: Cesium.Color.fromCssColorString("#111827"),
            outlineColor: Cesium.Color.WHITE,
            outlineWidth: 3,
            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
            horizontalOrigin: Cesium.HorizontalOrigin.CENTER,
            verticalOrigin: Cesium.VerticalOrigin.CENTER,
            disableDepthTestDistance: Number.POSITIVE_INFINITY,
            pixelOffset: new Cesium.Cartesian2(0, 0),
            scaleByDistance: new Cesium.NearFarScalar(250, 1.15, 3000, 0.45)
          }
        });
        overlayEntities.push(labelEntity);
      }
    }

    function setOverlayVisible(unitType, visible) {
      for (const overlay of overlayEntities) {
        if (overlay.unitType === unitType) overlay.show = visible;
      }
    }

    function applyUnitFilter(unitType) {
      currentFilter = unitType;
      if (!unitsDataSource) return;
      const filterText = String(unitType);
      const zonePrefix = "ZONE:";
      const isZoneFilter = filterText.startsWith(zonePrefix);
      const zoneName = isZoneFilter ? filterText.slice(zonePrefix.length) : "";
      const zoneSpecificFilter = currentZoneId === "ALL" && !isZoneFilter && filterText.includes(":");
      const targetZoneName = zoneSpecificFilter ? filterText.split(":")[0] : "";

      function isEntityHighlighted(entity) {
        if (unitType === "ALL" || isZoneFilter) return true;
        if (zoneSpecificFilter && entity.zoneName !== targetZoneName) return true;
        return entity.filterKey === unitType;
      }

      function isOverlayHighlighted(overlay) {
        if (unitType === "ALL" || isZoneFilter) return true;
        if (zoneSpecificFilter && !String(overlay.unitType || "").startsWith(`${targetZoneName}:`)) return true;
        return overlay.unitType === unitType;
      }

      for (const entity of unitsDataSource.entities.values) {
        if (!entity.polygon) continue;
        const selected = isEntityHighlighted(entity);
        const opacity = selected ? 1 : 0.16;
        entity.show = true;
        entity.polygon.material = entity.baseColor.withAlpha(opacity);
      }

      for (const overlay of overlayEntities) {
        const selected = isOverlayHighlighted(overlay);
        overlay.show = selected;
      }

      for (const button of legendEl.querySelectorAll("button")) {
        button.classList.toggle("active", button.dataset.unitType === unitType);
      }
    }

    function buildLegend(items, allFilter = "ALL", allLabel = "전체") {
      legendEl.innerHTML = "";
      const allButton = document.createElement("button");
      allButton.type = "button";
      allButton.dataset.unitType = allFilter;
      allButton.className = currentFilter === allFilter ? "active" : "";
      allButton.textContent = allLabel;
      allButton.addEventListener("click", () => applyUnitFilter(allFilter));
      legendEl.appendChild(allButton);

      for (const item of items) {
        const button = document.createElement("button");
        button.type = "button";
        button.dataset.unitType = item.filterKey;
        button.className = currentFilter === item.filterKey ? "active" : "";
        button.innerHTML = `<span class="swatch" style="background:${item.color}"></span>${item.label}`;
        button.addEventListener("click", () => applyUnitFilter(item.filterKey));
        legendEl.appendChild(button);
      }
    }

    function buildDefaultLegend() {
      if (currentZoneId === "ALL") {
        buildLegend([], "ALL", "전체");
        return;
      }
      buildLegend(loadedLegendItems, "ALL", "전체");
    }

    function showLegendForSelectedEntity(entity) {
      if (CANDIDATE_CONFIG && CANDIDATE_CONFIG.enabled) return;
      if (currentZoneId !== "ALL" || !entity || !entity.zoneName) return;
      const zoneName = entity.zoneName;
      const zoneItems = loadedLegendItems.filter(item => item.zoneName === zoneName);
      buildLegend(zoneItems, `ZONE:${zoneName}`, `${zoneName} 전체`);
      applyUnitFilter(`ZONE:${zoneName}`);
    }

    function raySampleKey(ray) {
      const sample = ray && ray.sample;
      if (!sample) return `angle:${Math.round(Number(ray && ray.angle) || 0)}`;
      return [
        sample.segmentIndex,
        sample.a.x.toFixed(2),
        sample.a.y.toFixed(2),
        sample.b.x.toFixed(2),
        sample.b.y.toFixed(2)
      ].join(":");
    }

    function displayRaysForFloorView(floorView, maxSamples = 80) {
      const rays = floorView && floorView.allOpenRays ? floorView.allOpenRays : [];
      if (!rays.length) return [];

      const bySample = new Map();
      for (const ray of rays) {
        const key = raySampleKey(ray);
        if (!bySample.has(key)) bySample.set(key, []);
        bySample.get(key).push(ray);
      }

      const groups = [...bySample.values()]
        .sort((a, b) => {
          const sampleA = a[0] && a[0].sample;
          const sampleB = b[0] && b[0].sample;
          const segmentDiff = Number(sampleA && sampleA.segmentIndex || 0) - Number(sampleB && sampleB.segmentIndex || 0);
          if (segmentDiff !== 0) return segmentDiff;
          return Number(sampleA && sampleA.a && sampleA.a.x || 0) - Number(sampleB && sampleB.a && sampleB.a.x || 0);
        });

      const stride = Math.max(1, Math.ceil(groups.length / maxSamples));
      const selected = [];
      for (let i = 0; i < groups.length; i += stride) {
        const group = groups[i].slice().sort((a, b) => a.order - b.order);
        if (group.length <= 2) {
          selected.push(...group);
        } else {
          selected.push(group[0], group[Math.floor(group.length / 2)], group[group.length - 1]);
        }
      }
      return selected;
    }

      const data = floorViewForEntity(entity, forcedFloor);

      const floorView = data.view;

      const rayColor = Cesium.Color.fromCssColorString("#0ea5e9").withAlpha(0.38);
      const bridgeColor = Cesium.Color.fromCssColorString("#f97316").withAlpha(0.95);

              a.lon, a.lat, baseHeight + 1.2,

            ]),
            width: 4,
            material: new Cesium.PolylineDashMaterialProperty({

            }),

      for (const ray of displayRaysForFloorView(floorView)) {

          polyline: {

            ]),

      for (const segment of floorView.visibleFacadeSegments || []) {
        const a = xyToLonLat(segment.a);
        const b = xyToLonLat(segment.b);
        selectedSightEntities.push(viewer.entities.add({
          name: `${entity.name} ${floor}층 조망 가능 외곽선`,
          polyline: {
            positions: Cesium.Cartesian3.fromDegreesArrayHeights([
              a.lon, a.lat, baseHeight,
              b.lon, b.lat, baseHeight
            ]),
            width: 7,
            material: facadeColor,
            clampToGround: false
          }
        }));
      }
    }

    function formatDistanceRange(rays) {
      if (!rays || !rays.length) return "0 m";
      const distances = rays.map(ray => ray.distance).filter(value => Number.isFinite(value));
      if (!distances.length) return "0 m";
      const min = Math.round(Math.min(...distances));
      const max = Math.round(Math.max(...distances));
      const avg = Math.round(distances.reduce((sum, value) => sum + value, 0) / distances.length);
      return min === max ? `${min} m` : `${min}~${max} m (평균 ${avg} m)`;
    }

    function formatOpenGapDetails(summary) {
      if (!summary || !summary.gaps || !summary.gaps.length) return "없음";
      return summary.gaps
        .slice()
        .sort((a, b) => a.start.order - b.start.order)
        .map(gap => {
          const start = Math.round(gap.start.angle);
          const end = Math.round(gap.end.angle);
          const min = Math.round(gap.distanceMin);
          const max = Math.round(gap.distanceMax);
          const distanceText = min === max ? `${min}m` : `${min}~${max}m`;
          return `${start}~${end}도 ${gap.size}도 / ${distanceText}`;
        })
        .join(" · ");
    }

    function formatDirectionSummary(analysis) {
      if (!analysis) return "계산 전";
      const order = ["서", "북서", "북", "북동", "동", "남동", "남", "남서"];
      const entries = Object.entries(analysis.openByDirection || {})
        .filter(([, summary]) => summary && summary.total > 0)
        .sort(([a], [b]) => {
          const ai = order.indexOf(a);
          const bi = order.indexOf(b);
          return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
        })
        .map(([name, summary]) => `${name} ${summary.total}도`);
      return entries.length ? entries.join(" / ") : "0도";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatUnitType(value) {
      const text = String(value ?? "").trim();
      if (!text) return "";
      return /py|평/i.test(text) ? escapeHtml(text) : `${escapeHtml(text)} PY`;
    }

    function formatDong(value) {
      const text = String(value ?? "").trim();
      if (!text) return "";
      return /동$/.test(text) ? escapeHtml(text) : `${escapeHtml(text)}동`;
    }

    function formatFloorCount(value) {
      const floor = Math.round(Number(value || 0));
      return floor > 0 ? `${floor}층` : "";
    }

    function formatFloorBandLabel(band, floorCount) {
      if (band.start === 1 && band.end < floorCount) return `${band.end}층 이하`;
      if (band.end === floorCount && band.start > 1) return `${band.start}층부터`;
      if (band.start === 1 && band.end === floorCount) return "전층";
      if (band.start === band.end) return `${band.start}층`;
      return `${band.start}~${band.end}층`;
    }

    function floorBandColor(index) {
      return ["#60a5fa", "#34d399", "#fbbf24", "#fb7185"][index % 4];
    }

    function formatFloorBandItem(label, riverAngle, index) {
      return `<span style="display:inline-block; margin-right:10px; color:${floorBandColor(index)}; font-weight:800; white-space:nowrap;">${escapeHtml(label)} ${Math.round(riverAngle)}도</span>`;
    }

    function formatBlockerCauseName(blocker) {
      const parts = [];
      if (blocker.zoneName) parts.push(escapeHtml(blocker.zoneName));
      if (blocker.dong) parts.push(formatDong(blocker.dong));
      if (blocker.unitType) parts.push(formatUnitType(blocker.unitType));
      return parts.join(" ") || "차폐 후보";
    }

    function formatFloorTransitionCause(cause, index) {
      if (!cause || !cause.blockers || !cause.blockers.length) return "";
      const color = floorBandColor(index);
      const blockers = cause.blockers.map(blocker => {
        const height = Number(blocker.height || 0);
        const distanceText = Number.isFinite(Number(blocker.distance))
          ? `${Math.round(Number(blocker.distance))}m`
          : "";
        const angleText = blocker.angle === null || blocker.angle === undefined
          ? ""
          : ` / ${Math.round(blocker.angle)}도 방향`;
        return `${formatBlockerCauseName(blocker)} / 높이 ${height.toFixed(1)}m / 거리 ${distanceText}${angleText}`;
      }).join("<br>");
      return `<div style="margin-bottom:4px;"><span style="color:${color}; font-weight:800;">${cause.floor}층부터 ${Math.round(cause.fromAngle)}도 → ${Math.round(cause.toAngle)}도</span><br>${blockers}</div>`;
    }

    function formatFloorTransitionCauses(analysis) {
      if (!analysis || !analysis.floorBands || analysis.floorBands.length <= 1) return "";
      return analysis.floorBands
        .map((band, index) => formatFloorTransitionCause(band.transitionCause, index))
        .filter(Boolean)
        .join("");
    }

    function formatFloorBands(analysis) {
      if (!analysis || !analysis.floorBands || !analysis.floorBands.length) return "계산 전";
      const floorCount = analysis.displayFloor;
      const bands = analysis.floorBands;
      if (bands.length === 1) {
        const only = bands[0];
        return formatFloorBandItem(
          "전층",
          only.summary.totalOpen,
          0
        );
      }
      const items = bands.map((band, index) => {
        const label = formatFloorBandLabel(band, floorCount);
        const riverAngle = band.summary.totalOpen;
        return formatFloorBandItem(label, riverAngle, index);
      });
      return items.join("");
    }

    function buildDescription(props) {
      const analysis = viewAnalysisByFid.get(String(props.fid));
      const rows = [
        ["구역", escapeHtml(props.zone || props.source_zone || "")],
        ["동", formatDong(props.dong)],
        ["타입", formatUnitType(props.unit_type)],
        ...(candidateEntryForFid(props.fid) ? [["배정확률", `${Number(candidateEntryForFid(props.fid).probability).toFixed(1)}%`]] : []),
        ["최고층", formatFloorCount(normalizedFloorCount(props))],
        ["최고층 조망각", analysis ? `${analysis.totalOpen}도` : "계산 전"],
        ["층별 변화", analysis ? formatFloorBands(analysis) : "계산 전"]
      ];
      return `
        <table class="selection-detail-table">
          <tbody>
            ${rows.map(([k, v]) => `<tr><th>${k}</th><td>${v ?? ""}</td></tr>`).join("")}
          </tbody>
        </table>
      `;
    }

    function propsFromEntity(entity) {
      const props = {};
      const propertyNames = entity.properties ? entity.properties.propertyNames : [];
      for (const name of propertyNames) {
        props[name] = entity.properties[name].getValue(Cesium.JulianDate.now());
      }
      return props;
    }

    function updateSelectionDetails(entity) {
      if (!selectionDetailTitleEl || !selectionDetailBodyEl) return;
      if (!entity || !entity.polygon || !entity.fidValue) {
        selectionDetailTitleEl.textContent = "선택 상세";
        selectionDetailBodyEl.innerHTML = '<div class="selection-detail-empty">유닛을 클릭하면 상세설명이 표시됩니다.</div>';
        return;
      }

      const props = propsFromEntity(entity);
      selectionDetailTitleEl.textContent = entity.name || "선택 상세";
      selectionDetailBodyEl.innerHTML = buildDescription(props);
    }

    function formatDegrees(value) {
      return `${value.toFixed(7)}°`;
    }

    function pickSceneCartesian(screenPosition) {
      if (!screenPosition) return null;
      if (viewer.scene.pickPositionSupported) {
        const picked = viewer.scene.pickPosition(screenPosition);
        if (Cesium.defined(picked)) return picked;
      }
      return viewer.camera.pickEllipsoid(screenPosition, viewer.scene.globe.ellipsoid);
    }

    function pickedHeightFallbackRows(lon, lat, sceneHeight, message) {
      return `
        <table class="selection-detail-table">
          <tbody>
            <tr><th>경도</th><td>${formatDegrees(lon)}</td></tr>
            <tr><th>위도</th><td>${formatDegrees(lat)}</td></tr>
            <tr><th>실제 지형 표고</th><td>${message}</td></tr>
            <tr><th>장면 표면 높이</th><td>${sceneHeight.toFixed(1)} m</td></tr>
            <tr><th>기준</th><td>Cesium World Terrain 질의</td></tr>
          </tbody>
        </table>
      `;
    }

    async function updatePickedHeightDetails(screenPosition) {
      if (!selectionDetailTitleEl || !selectionDetailBodyEl) return;
      const cartesian = pickSceneCartesian(screenPosition);
      if (!cartesian) return;
      const cartographic = Cesium.Cartographic.fromCartesian(cartesian);
      const lon = Cesium.Math.toDegrees(cartographic.longitude);
      const lat = Cesium.Math.toDegrees(cartographic.latitude);
      const sceneHeight = cartographic.height;
      selectionDetailTitleEl.textContent = "클릭 지점 고도";
      selectionDetailBodyEl.innerHTML = `
        <table class="selection-detail-table">
          <tbody>
            <tr><th>경도</th><td>${formatDegrees(lon)}</td></tr>
            <tr><th>위도</th><td>${formatDegrees(lat)}</td></tr>
            <tr><th>실제 지형 표고</th><td>조회 중...</td></tr>
            <tr><th>장면 표면 높이</th><td>${sceneHeight.toFixed(1)} m</td></tr>
            <tr><th>기준</th><td>Cesium World Terrain 질의</td></tr>
          </tbody>
        </table>
      `;

      try {
        const terrainProvider = await ensureWorldTerrainProvider();
        if (!terrainProvider) {
          selectionDetailBodyEl.innerHTML = pickedHeightFallbackRows(lon, lat, sceneHeight, "토큰 필요");
          return;
        }
        const sampled = await Cesium.sampleTerrainMostDetailed(terrainProvider, [
          Cesium.Cartographic.fromDegrees(lon, lat)
        ]);
        const terrainHeight = sampled && sampled[0] && Number.isFinite(sampled[0].height)
          ? sampled[0].height
          : null;
        selectionDetailBodyEl.innerHTML = pickedHeightFallbackRows(
          lon,
          lat,
          sceneHeight,
          terrainHeight === null ? "조회 실패" : `${terrainHeight.toFixed(1)} m`
        );
      } catch (error) {
        selectionDetailBodyEl.innerHTML = pickedHeightFallbackRows(
          lon,
          lat,
          sceneHeight,
          `조회 실패: ${error.message}`
        );
      }
    }

    function refreshLoadedDescriptions() {
      if (!unitsDataSource) return;
      for (const entity of unitsDataSource.entities.values) {
        if (!entity.polygon) continue;
        entity.description = buildDescription(propsFromEntity(entity));
      }
    }

    function riverStatusText() {
      if (!lastRiverStats) return "한강라인: 미로드";
      return [
        `한강라인: ${lastRiverStats.lineCount}개`,
        `원본 길이: ${Math.round(lastRiverStats.sourceLength)} m`,
        `계산 길이: ${Math.round(lastRiverStats.analysisLength)} m`,
        `끝단 확장: ${Math.round(lastRiverStats.extendMeters)} m`,
        `스캔점: ${lastRiverStats.pointCount}개`
      ].join("\n");
    }

    function rebuildRiverContexts() {
      riverContextsByZone.clear();
      const extendMeters = getRiverExtendMeters();
      for (const [zoneId, data] of riverRawGeoJsonByZone.entries()) {
        riverContextsByZone.set(zoneId, buildRiverContext(data, extendMeters));
      }
    }

    async function recalculateViews(message = "조망 계산 갱신 완료") {
      if (!riverRawGeoJson) {
        setStatus("한강라인 GeoJSON이 아직 로드되지 않았습니다.");
        return;
      }

      const zonesToRecalculate = new Set(calculatedZones);
      const selectedZoneId = zoneIdFromEntity(viewer.selectedEntity);
      if (selectedZoneId) zonesToRecalculate.add(selectedZoneId);
      if (!zonesToRecalculate.size && currentZoneId !== "ALL") zonesToRecalculate.add(currentZoneId);

      rebuildRiverContexts();
      lastRiverStats = prepareRiverSegments(riverRawGeoJson, getRiverExtendMeters());
      drawRiverLines();
      resetViewAnalysisCache();
      refreshLoadedDescriptions();

      if (zonesToRecalculate.size) {
        for (const zoneId of zonesToRecalculate) {
          await analyzeViewsForZone(zoneId, { force: true });
        }
      }

      setStatus(`${message}\n${riverStatusText()}\n유닛 수: ${footprints.length}\n계산 완료 구역: ${[...calculatedZones].map(zoneLabelForStatus).join(", ") || "없음"}`);
      if (viewer.selectedEntity) {
        drawSelectedSightLines(viewer.selectedEntity);
        updateSelectionDetails(viewer.selectedEntity);
      }
      updateFloorTotalAngle(viewer.selectedEntity);
    }

    async function loadGeoJson(input, loadedLabel = "") {
      if (unitsDataSource) {
        viewer.dataSources.remove(unitsDataSource, true);
        unitsDataSource = null;
      }
      viewer.selectedEntity = undefined;
      updateSelectionDetails(null);
      updateEyeFloorInput(null);
      updateFloorTotalAngle(null);
      clearOutlines();
      clearSelectedSightLines();
      prepareFootprints(input);
      resetViewAnalysisCache();

      const source = await Cesium.GeoJsonDataSource.load(input, {
        clampToGround: false,
        stroke: Cesium.Color.TRANSPARENT,
        fill: Cesium.Color.RED,
        strokeWidth: 0
      });

      const entities = source.entities.values;
      let validCount = 0;
      let maxHeight = 0;
      const legendMap = new Map();

      for (const entity of entities) {
        if (!entity.polygon) continue;

        const props = propsFromEntity(entity);

        const finalHeight = totalBuildingHeight(props);
        const fill = colorFromHex(props.fill_color, Cesium.Color.RED, 1);
        const unitType = String(props.unit_type || "").trim();
        const typeLabel = unitType ? `${unitType}PY` : "";
        const cssColor = cssColorFromHex(props.fill_color, "#ef4444");
        const zoneName = String(props.zone || props.source_zone || "").trim();
        const filterKey = currentZoneId === "ALL" ? `${zoneName}:${unitType}` : unitType;
        const legendLabel = currentZoneId === "ALL" && zoneName ? `${zoneName} ${unitType}PY` : `${unitType}PY`;

        entity.name = `${zoneName ? `${zoneName} ` : ""}${props.dong || ""}동 ${props.unit_type || ""}`;
        entity.fidValue = props.fid;
        entity.unitType = unitType;
        entity.filterKey = filterKey;
        entity.zoneName = zoneName;
        entity.baseColor = fill;
        const matchingFootprint = footprints.find(f => String(f.fid) === String(props.fid));
        entity.footprintForSight = matchingFootprint || null;
        entity.positionForSight = matchingFootprint ? {
          xy: matchingFootprint.center,
          height: finalHeight
        } : null;
        entity.description = buildDescription(props);
        entity.polygon.height = 0;
        entity.polygon.extrudedHeight = finalHeight;
        entity.polygon.material = fill;
        entity.polygon.outline = false;
        entity.polygon.shadows = Cesium.ShadowMode.DISABLED;
        entity.polygon.closeTop = true;
        entity.polygon.closeBottom = true;
        addSharpOutlineAndLabel(entity, finalHeight, typeLabel, unitType, filterKey, props.fid);
        if (unitType && !legendMap.has(filterKey)) {
          legendMap.set(filterKey, { filterKey, unitType, zoneName, label: legendLabel, color: cssColor });
        }

        validCount += 1;
        maxHeight = Math.max(maxHeight, finalHeight);
      }

      unitsDataSource = source;
      await viewer.dataSources.add(source);
      loadedLegendItems = [...legendMap.values()].sort((a, b) => {
        const zoneCompare = String(a.label).localeCompare(String(b.label), "ko");
        const unitCompare = Number.parseFloat(a.unitType) - Number.parseFloat(b.unitType);
        return currentZoneId === "ALL" ? zoneCompare : unitCompare;
      });
      currentFilter = "ALL";
      buildDefaultLegend();
      applyUnitFilter(currentFilter);
      let candidateEntities = [];
      if (CANDIDATE_CONFIG && CANDIDATE_CONFIG.enabled) {
        configureCandidateHeader();
        candidateEntities = applyCandidatePresentation();
      }
      await viewer.zoomTo(candidateEntities.length ? candidateEntities : source, new Cesium.HeadingPitchRange(
        Cesium.Math.toRadians(335),
        Cesium.Math.toRadians(-45),
        candidateEntities.length ? 650 : 900
      ));
      if (candidateEntities.length) {
        const best = candidateEntities.find(entity => String(entity.fidValue) === String(CANDIDATE_CONFIG.bestFid)) || candidateEntities[0];
        setTimeout(() => { viewer.selectedEntity = best; }, 350);
      }

      const prefix = loadedLabel ? `${loadedLabel} 로드 완료` : "GeoJSON 로드 완료";
      setStatus(`${prefix}\n유닛 수: ${validCount}\n최대 높이: ${maxHeight.toFixed(1)} m\n${riverStatusText()}`);
    }

    function applyZone4DongFloorSwap(geojson, sourceUrl = "") {
      if (!geojson || !Array.isArray(geojson.features)) return geojson;
      const sourceText = String(sourceUrl || geojson.__sourceUrl || "");
      const isZone4 = /apgujeong_4_units\.geojson/i.test(sourceText) || String(geojson.name || "") === "apgujeong_4_units";
      if (!isZone4) return geojson;

      for (const feature of geojson.features) {
        const props = feature.properties || {};
        const dong = String(props.dong || "").trim();
        if (dong === "102") {
          props.floors = 49;
          props.floor_h = 3.692;
          props.height_m = 188.91;
          delete props.height_basis;
          delete props.floor_h_note;
        } else if (dong === "103") {
          props.floors = 68;
          props.floor_h = 3.558823529;
          props.height_m = 250.0;
          props.height_basis = "total_250m_for_68f";
          props.floor_h_note = "floor_h adjusted so floors*floor_h+piloti_m equals 250m total height";
        }
      }
      return geojson;
    }

    async function fetchGeoJson(url) {
      const urls = Array.isArray(url) ? url : [url];
      const errors = [];
      for (const candidate of urls) {
        try {
          const cacheBustedUrl = `${candidate}${String(candidate).includes("?") ? "&" : "?"}v=${encodeURIComponent(DATA_VERSION)}`;
          const response = await fetch(cacheBustedUrl, { cache: "no-store" });
          if (!response.ok) throw new Error(`${candidate}: HTTP ${response.status}`);
          const data = await response.json();
          data.__sourceUrl = candidate;
          return applyZone4DongFloorSwap(data, candidate);
        } catch (error) {
          errors.push(error.message);
        }
      }
      throw new Error(errors.join(" / "));
    }

    function readStoredIonToken() {
      const fromUrl = new URLSearchParams(window.location.search).get("ionToken");
      if (fromUrl && fromUrl.trim()) {
        localStorage.setItem("apgujeong_cesium_ion_token", fromUrl.trim());
        return fromUrl.trim();
      }
      return localStorage.getItem("apgujeong_cesium_ion_token") || "";
    }

    function ensureIonToken() {
      const existing = Cesium.Ion.defaultAccessToken || readStoredIonToken();
      if (existing && existing.trim()) {
        Cesium.Ion.defaultAccessToken = existing.trim();
        return true;
      }

      const token = window.prompt(
        "Cesium OSM Buildings와 World Terrain에는 Cesium ion 토큰이 필요합니다.\n토큰은 이 브라우저 localStorage에만 저장됩니다."
      );
      if (!token || !token.trim()) return false;
      Cesium.Ion.defaultAccessToken = token.trim();
      localStorage.setItem("apgujeong_cesium_ion_token", token.trim());
      return true;
    }

    function ensureIonTokenForOsm() {
      return ensureIonToken();
    }

    async function ensureWorldTerrainProvider() {
      if (worldTerrainProvider) return worldTerrainProvider;
      if (!ensureIonToken()) return null;
      if (!worldTerrainProviderPromise) {
        worldTerrainProviderPromise = Cesium.createWorldTerrainAsync();
      }
      worldTerrainProvider = await worldTerrainProviderPromise;
      return worldTerrainProvider;
    }

    function outerRingsFromBoundaryFeature(feature) {
      const geometry = feature && feature.geometry;
      if (!geometry || !geometry.coordinates) return [];
      if (geometry.type === "Polygon") {
        return geometry.coordinates[0] ? [geometry.coordinates[0]] : [];
      }
      if (geometry.type === "MultiPolygon") {
        return geometry.coordinates
          .map((polygon) => polygon && polygon[0])
          .filter(Boolean);
      }
      return [];
    }

    function positionsFromBoundaryRing(ring) {
      if (!ring || ring.length < 4) return null;
      const flat = [];
      const first = ring[0];
      const last = ring[ring.length - 1];
      const isClosed = first && last && first[0] === last[0] && first[1] === last[1];
      const cleanRing = isClosed ? ring.slice(0, -1) : ring;
      for (const coord of cleanRing) {
        flat.push(coord[0], coord[1]);
      }
      return Cesium.Cartesian3.fromDegreesArray(flat);
    }

    async function buildOsmClippingPolygons() {
      if (!Cesium.ClippingPolygonCollection || !Cesium.ClippingPolygonCollection.isSupported(viewer.scene)) {
        return null;
      }

      const maskData = await fetchGeoJson(OSM_CLIP_URLS);
      const polygons = [];
      for (const feature of maskData.features || []) {
        for (const ring of outerRingsFromBoundaryFeature(feature)) {
          const positions = positionsFromBoundaryRing(ring);
          if (!positions) continue;
          polygons.push(new Cesium.ClippingPolygon({ positions }));
        }
      }
      if (!polygons.length) return null;

      return new Cesium.ClippingPolygonCollection({
        polygons,
        inverse: false,
        quality: 1.0
      });
    }

    function applyOsmTilesetAppearance(tileset) {
      tileset.style = new Cesium.Cesium3DTileStyle({
        color: "color('#e8edf2', 1.0)"
      });
      tileset.showOutline = true;
      tileset.outlineColor = Cesium.Color.BLACK;
      if (Cesium.Cesium3DTileColorBlendMode) {
        tileset.colorBlendMode = Cesium.Cesium3DTileColorBlendMode.REPLACE;
      }
      if (Cesium.ShadowMode) {
        tileset.shadows = Cesium.ShadowMode.DISABLED;
      }
      if (Cesium.CustomShader && Cesium.LightingModel) {
        const shaderOptions = {
          lightingModel: Cesium.LightingModel.UNLIT,
          fragmentShaderText: `
            void fragmentMain(FragmentInput fsInput, inout czm_modelMaterial material) {
              material.diffuse = vec3(0.91, 0.93, 0.95);
              material.alpha = 1.0;
            }
          `
        };
        if (Cesium.CustomShaderTranslucencyMode) {
          shaderOptions.translucencyMode = Cesium.CustomShaderTranslucencyMode.OPAQUE;
        }
        tileset.customShader = new Cesium.CustomShader(shaderOptions);
      }
    }

    function applyOsmTilesetHeightOffset(tileset) {
      const cartographic = Cesium.Cartographic.fromCartesian(APGUJEONG_ROTATE_CENTER);
      const surface = Cesium.Cartesian3.fromRadians(cartographic.longitude, cartographic.latitude, 0);
      const shifted = Cesium.Cartesian3.fromRadians(
        cartographic.longitude,
        cartographic.latitude,
        OSM_BUILDING_VERTICAL_OFFSET_M
      );
      const translation = Cesium.Cartesian3.subtract(shifted, surface, new Cesium.Cartesian3());
      tileset.modelMatrix = Cesium.Matrix4.fromTranslation(translation);
    }

    async function ensureOsmBuildings() {
      if (osmBuildingsTileset) return osmBuildingsTileset;
      if (osmBuildingsLoading) return null;
      if (!ensureIonTokenForOsm()) {
        setStatus("주변건물 표시가 취소되었습니다. Cesium ion 토큰이 필요합니다.");
        return null;
      }

      osmBuildingsLoading = true;
      setStatus("OSM 주변건물 로드 중...");
      try {
        const clippingPolygons = await buildOsmClippingPolygons();
        const tileset = await Cesium.createOsmBuildingsAsync({
          style: new Cesium.Cesium3DTileStyle({
            color: "color('#e8edf2', 1.0)"
          }),
          showOutline: true
        });
        applyOsmTilesetAppearance(tileset);
        applyOsmTilesetHeightOffset(tileset);
        if (clippingPolygons) {
          tileset.clippingPolygons = clippingPolygons;
        }
        tileset.show = false;
        viewer.scene.primitives.add(tileset);
        osmBuildingsTileset = tileset;
        setStatus(clippingPolygons
          ? "OSM 주변건물 로드 완료. 압구정 구역 내부 기존건물은 잘라냈습니다."
          : "OSM 주변건물 로드 완료. 이 브라우저는 clipping polygon을 지원하지 않아 구역 내부 기존건물이 겹칠 수 있습니다.");
        return tileset;
      } catch (error) {
        setStatus(`OSM 주변건물 로드 실패: ${error.message}`);
        return null;
      } finally {
        osmBuildingsLoading = false;
      }
    }

    async function showOsmBuildings() {
      const tileset = await ensureOsmBuildings();
      if (!tileset) return;
      osmBuildingsVisible = true;
      tileset.show = true;
      setStatus("OSM 주변건물을 표시했습니다. 압구정 구역 내부 기존건물은 clipping 마스크로 숨깁니다.");
    }

    function featureIdValue(feature, fallbackIndex) {
      const props = feature.properties || {};
      const fid = props.fid;
      if (fid !== null && fid !== undefined && String(fid).trim() !== "") return fid;
      return fallbackIndex + 1;
    }

    function cloneFeatureWithZone(feature, zoneId, fallbackIndex = 0) {
      const props = { ...(feature.properties || {}) };
      const sourceFid = featureIdValue(feature, fallbackIndex);
      props.source_fid = sourceFid;
      props.source_zone = zoneId;
      props.fid = `${zoneId}-${sourceFid}`;
      return {
        type: "Feature",
        properties: props,
        geometry: feature.geometry
      };
    }

    function combineFeatureCollections(collections) {
      return {
        type: "FeatureCollection",
        features: collections.flatMap(({ data, zoneId }) =>
          (data.features || []).map((feature, index) => cloneFeatureWithZone(feature, zoneId, index))
        )
      };
    }

    function combineRiverCollections(collections) {
      return {
        type: "FeatureCollection",
        features: collections.flatMap(({ data }) => data.features || [])
      };
    }

    function setActiveZoneButton(zoneId) {
      for (const button of document.querySelectorAll("[data-zone]")) {
        button.classList.toggle("active", button.dataset.zone === zoneId);
      }
    }

    async function loadZone(zoneId) {
      const config = ZONE_CONFIGS[zoneId] || ZONE_CONFIGS["2"];
      currentZoneId = zoneId;
      setActiveZoneButton(zoneId);
      setStatus(`${config.label} 데이터를 불러오는 중입니다.`);
      try {
        let riverData;
        let unitsData;

        if (config.zoneIds) {
          const zoneConfigs = config.zoneIds.map(id => ({ id, ...ZONE_CONFIGS[id] }));
          const unitCollections = await Promise.all(
            zoneConfigs.map(async item => ({
              zoneId: item.id,
              data: await fetchGeoJson(item.unitsUrl)
            }))
          );
          const uniqueRiverUrls = [...new Set(zoneConfigs.map(item => item.riverUrl))];
          const riverCollections = await Promise.all(
            uniqueRiverUrls.map(async url => ({ data: await fetchGeoJson(url) }))
          );
          const riverDataByUrl = new Map(riverCollections.map(({ data }, index) => [uniqueRiverUrls[index], data]));
          riverRawGeoJsonByZone.clear();
          for (const item of zoneConfigs) {
            riverRawGeoJsonByZone.set(item.id, riverDataByUrl.get(item.riverUrl));
          }
          unitsData = combineFeatureCollections(unitCollections);
          riverData = combineRiverCollections(riverCollections);
        } else {
          const [singleRiverData, singleUnitsData] = await Promise.all([
            fetchGeoJson(config.riverUrl),
            fetchGeoJson(config.unitsUrl)
          ]);
          riverRawGeoJsonByZone.clear();
          riverRawGeoJsonByZone.set(zoneId, singleRiverData);
          unitsData = combineFeatureCollections([{ zoneId, data: singleUnitsData }]);
          riverData = singleRiverData;
        }

        riverRawGeoJson = riverData;
        rebuildRiverContexts();
        lastRiverStats = prepareRiverSegments(riverRawGeoJson, getRiverExtendMeters());
        drawRiverLines();
        await loadGeoJson(unitsData, config.label);
      } catch (error) {
        setStatus(`${config.label} 로드 실패: ${error.message}`);
      }
    }

    function applyVworldBaseMap() {
      const key = readStoredVworldKey();
      if (!key) {
        applyPublicBaseMap("street");
        return;
      }

      if (vworldLayer) {
        viewer.imageryLayers.remove(vworldLayer, true);
      }
      if (publicBaseLayer) {
        viewer.imageryLayers.remove(publicBaseLayer, true);
        publicBaseLayer = null;
      }

      const provider = new Cesium.UrlTemplateImageryProvider({
        url: `https://api.vworld.kr/req/wmts/1.0.0/${key}/Satellite/{z}/{y}/{x}.jpeg`,
        minimumLevel: 6,
        maximumLevel: 19,
        tilingScheme: new Cesium.WebMercatorTilingScheme(),
        credit: "V-World"
      });

      vworldLayer = viewer.imageryLayers.addImageryProvider(provider);
      viewer.imageryLayers.lowerToBottom(vworldLayer);
      setActiveMapButton("");
      setStatus("V-World 위성 배경 적용 시도 완료.");
    }

    const geojsonFileInput = document.getElementById("geojsonFile");
    if (geojsonFileInput) {
      geojsonFileInput.addEventListener("change", async (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          await loadGeoJson(data);
        } catch (error) {
          setStatus(`수동 파일 로드 실패: ${error.message}`);
        }
      });
    }

    const riverFileInput = document.getElementById("riverFile");
    if (riverFileInput) {
      riverFileInput.addEventListener("change", async (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          riverRawGeoJson = JSON.parse(text);
          await recalculateViews("수동 한강라인 로드 완료");
        } catch (error) {
          setStatus(`한강라인 수동 로드 실패: ${error.message}`);
        }
      });
    }

    const recalculateButton = document.getElementById("recalculateViews");
    if (recalculateButton) {
      recalculateButton.addEventListener("click", () => {
        recalculateViews("조망 계산 갱신 완료");
      });
    }

    if (riverExtendInput) {
      riverExtendInput.addEventListener("change", () => {
        recalculateViews("한강라인 확장값 반영 완료");
      });
    }

    for (const button of document.querySelectorAll("[data-zone]")) {
      button.addEventListener("click", () => {
        loadZone(button.dataset.zone);
      });
    }

    for (const button of document.querySelectorAll("[data-map]")) {
      button.addEventListener("click", () => {
        applyPublicBaseMap(button.dataset.map);
      });
    }

    if (startEyeRotateButton) {
      startEyeRotateButton.addEventListener("click", startEyeLevelRotate);
    }

    if (eyeFloorInputEl) {
      const handleFloorInput = () => {
        if (viewer.selectedEntity) drawSelectedSightLines(viewer.selectedEntity);
        updateFloorTotalAngle(viewer.selectedEntity);
      };
      eyeFloorInputEl.addEventListener("input", handleFloorInput);
      eyeFloorInputEl.addEventListener("change", handleFloorInput);
    }

    document.getElementById("stopRotate").addEventListener("click", stopAutoRotate);

    const pickHeightHandler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    pickHeightHandler.setInputAction((movement) => {
      const picked = viewer.scene.pick(movement.position);
      const pickedEntity = picked && picked.id;
      if (pickedEntity && pickedEntity.polygon && pickedEntity.fidValue) {
        lastPickedHeightScreenPosition = null;
        return;
      }
      lastPickedHeightScreenPosition = Cesium.Cartesian2.clone(movement.position);
      updatePickedHeightDetails(movement.position);
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    viewer.selectedEntityChanged.addEventListener(async (entity) => {
      updateEyeFloorInput(entity);
      clearSelectedSightLines();

      if (!entity || !entity.polygon || !entity.fidValue) {
        if (lastPickedHeightScreenPosition) {
          setTimeout(() => updatePickedHeightDetails(lastPickedHeightScreenPosition), 0);
        } else {
          updateSelectionDetails(null);
        }
        return;
      }

      showLegendForSelectedEntity(entity);
      updateSelectionDetails(entity);

      const zoneId = zoneIdFromEntity(entity);
      const fid = String(entity.fidValue);
      if (!viewAnalysisByFid.has(fid)) {
        setStatus(`${zoneLabelForStatus(zoneId)} 조망 계산을 시작합니다.`);
        await analyzeViewsForZone(zoneId);
      }

      if (viewer.selectedEntity !== entity) return;
      drawSelectedSightLines(entity);
      updateSelectionDetails(entity);
      updateFloorTotalAngle(entity);
    });

    setTimeout(() => applyPublicBaseMap("street"), 300);

    loadZone(currentZoneId);

    // 주변 OSM 3D 건물은 유닛/지도 초기 표시를 먼저 끝낸 뒤 지연 로딩합니다.
    setTimeout(() => {
      showOsmBuildings();
    }, 3000);
  </script>
</body>
</html>
