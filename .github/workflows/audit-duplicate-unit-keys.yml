name: Audit duplicate unit keys

on:
  push:
    paths:
      - tools/audit_duplicate_unit_keys.py
      - .github/workflows/audit-duplicate-unit-keys.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python tools/audit_duplicate_unit_keys.py > data/duplicate_unit_keys_audit.log
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/duplicate_unit_keys_audit.json data/duplicate_unit_keys_audit.log
          if ! git diff --cached --quiet; then
            git commit -m "Audit duplicate unit keys"
            git push
          fi
