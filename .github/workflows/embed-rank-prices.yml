name: Embed 2026 rank prices

on:
  push:
    paths:
      - tools/generate_embedded_rank_prices.py
      - tools/patch_app_embedded_rank_prices.py
      - .github/workflows/embed-rank-prices.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate, patch and validate
        id: build
        continue-on-error: true
        run: |
          set +e
          : > data/rank_prices_2026_embedded.log
          python tools/generate_embedded_rank_prices.py >> data/rank_prices_2026_embedded.log 2>&1
          generate_code=$?
          echo "generate_code=$generate_code" >> data/rank_prices_2026_embedded.log

          if [ "$generate_code" -eq 0 ]; then
            python tools/patch_app_embedded_rank_prices.py >> data/rank_prices_2026_embedded.log 2>&1
            patch_code=$?
          else
            patch_code=99
          fi
          echo "patch_code=$patch_code" >> data/rank_prices_2026_embedded.log

          if [ "$patch_code" -eq 0 ]; then
            python -m py_compile app.py >> data/rank_prices_2026_embedded.log 2>&1
            syntax_code=$?
          else
            syntax_code=99
          fi
          echo "syntax_code=$syntax_code" >> data/rank_prices_2026_embedded.log

          if [ "$syntax_code" -eq 0 ]; then
            python - <<'PY' >> data/rank_prices_2026_embedded.log 2>&1
          import csv
          from collections import Counter
          counts = Counter()
          keys = set()
          with open('data/rank_prices_2026_embedded.csv', encoding='utf-8-sig', newline='') as f:
              for row in csv.DictReader(f):
                  counts[row['구역']] += 1
                  key = (row['구역'], row['단지명'], row['동'], row['호'])
                  if key in keys:
                      raise SystemExit(f'duplicate unit key: {key}')
                  keys.add(key)
          counts = dict(counts)
          expected = {'2구역': 1924, '3구역': 3934, '4구역': 1340, '5구역': 1232}
          print('counts=', counts)
          if counts != expected:
              raise SystemExit(f'coverage mismatch: {counts} != {expected}')
          PY
            validate_code=$?
          else
            validate_code=99
          fi
          echo "validate_code=$validate_code" >> data/rank_prices_2026_embedded.log

          final_code=0
          for code in "$generate_code" "$patch_code" "$syntax_code" "$validate_code"; do
            if [ "$code" -ne 0 ]; then final_code=$code; break; fi
          done
          echo "$final_code" > data/rank_prices_2026_embedded.status
          echo "exit_code=$final_code" >> "$GITHUB_OUTPUT"
          cat data/rank_prices_2026_embedded.log
          exit 0
      - name: Commit data, app and logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.py data/rank_prices_2026_embedded.log data/rank_prices_2026_embedded.status
          if [ -f data/rank_prices_2026_embedded.csv ]; then git add data/rank_prices_2026_embedded.csv; fi
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Build embedded adjusted 2026 rank prices"
            git push
          fi
      - name: Fail when build failed
        if: steps.build.outputs.exit_code != '0'
        run: |
          echo "Embedded rank-price build failed. See data/rank_prices_2026_embedded.log"
          exit 1
