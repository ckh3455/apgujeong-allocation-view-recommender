name: Embed 2026 rank prices

on:
  push:
    paths:
      - tools/generate_embedded_rank_prices.py
      - tools/patch_app_embedded_rank_prices.py
      - .github/workflows/embed-rank-prices.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate embedded adjusted prices
        run: python tools/generate_embedded_rank_prices.py | tee data/rank_prices_2026_embedded.log
      - name: Patch app to use embedded prices
        run: python tools/patch_app_embedded_rank_prices.py
      - name: Validate Python syntax
        run: python -m py_compile app.py
      - name: Validate generated coverage
        run: |
          python - <<'PY'
          import csv
          from collections import Counter
          counts = Counter()
          keys = set()
          with open('data/rank_prices_2026_embedded.csv', encoding='utf-8-sig', newline='') as f:
              for row in csv.DictReader(f):
                  counts[row['구역']] += 1
                  key = (row['구역'], row['단지명'], row['동'], row['호'])
                  if key in keys:
                      raise SystemExit(f'duplicate unit key: {key}')
                  keys.add(key)
          counts = dict(counts)
          expected = {'2구역': 1924, '3구역': 3934, '4구역': 1340, '5구역': 1232}
          print('counts=', counts)
          if counts != expected:
              raise SystemExit(f'coverage mismatch: {counts} != {expected}')
          PY
      - name: Commit embedded data and app changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.py data/rank_prices_2026_embedded.csv data/rank_prices_2026_embedded.log
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Use embedded adjusted 2026 rank prices"
            git push
          fi
