name: Audit recorded floor prices

on:
  push:
    paths:
      - tools/audit_recorded_floor_prices.py
      - data/main_data.xlsx
      - .github/workflows/audit-recorded-floor-prices.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run audit
        run: |
          python3 tools/audit_recorded_floor_prices.py | tee data/floor_price_audit.log

      - name: Commit audit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/floor_price_audit.json data/floor_price_audit_mismatches.csv data/floor_price_audit.md data/floor_price_audit.log
          if git diff --cached --quiet; then
            echo "No audit changes."
          else
            git commit -m "Audit recorded 2026 floor prices"
            git push
          fi
