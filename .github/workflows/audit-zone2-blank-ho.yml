name: Audit zone 2 blank ho

on:
  push:
    paths:
      - tools/audit_zone2_blank_ho_neighbors.py
      - .github/workflows/audit-zone2-blank-ho.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python tools/audit_zone2_blank_ho_neighbors.py > data/zone2_blank_ho_neighbors.log
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/zone2_blank_ho_neighbors.json data/zone2_blank_ho_neighbors.log
          if ! git diff --cached --quiet; then
            git commit -m "Audit blank zone 2 unit number"
            git push
          fi
