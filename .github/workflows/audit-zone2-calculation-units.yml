name: Audit zone 2 calculation units

on:
  push:
    paths:
      - tools/audit_zone2_calculation_units.py
      - .github/workflows/audit-zone2-calculation-units.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: ckh3455/APGUJEONG-VIEW
          ref: main
          path: current-view
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python tools/audit_zone2_calculation_units.py > data/zone2_calculation_units_audit.log
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/zone2_calculation_units_audit.json data/zone2_calculation_units_audit.log
          if ! git diff --cached --quiet; then
            git commit -m "Audit zone 2 calculation units"
            git push
          fi
