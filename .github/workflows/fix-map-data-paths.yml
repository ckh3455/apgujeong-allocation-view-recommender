name: Patch embedded Cesium map

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-map-data-paths.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch index_view_candidates.html
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index_view_candidates.html')
          text = path.read_text(encoding='utf-8')

          start_marker = '    function applyPublicBaseMap(mapId = "street") {'
          async_marker = '    async function applyPublicBaseMap(mapId = "street") {'
          end_marker = '\n    function readStoredVworldKey()'

          start = text.find(async_marker)
          if start < 0:
              start = text.find(start_marker)
          if start < 0:
              raise RuntimeError('applyPublicBaseMap function not found')

          end = text.find(end_marker, start)
          if end < 0:
              raise RuntimeError('readStoredVworldKey marker not found')

          replacement = '''    async function applyPublicBaseMap(mapId = "street") {
            if (publicBaseLayer) {
              viewer.imageryLayers.remove(publicBaseLayer, true);
              publicBaseLayer = null;
            }

            if (vworldLayer) {
              viewer.imageryLayers.remove(vworldLayer, true);
              vworldLayer = null;
            }

            const config = MAP_CONFIGS[mapId] || MAP_CONFIGS.street;
            setActiveMapButton(mapId);
            setStatus(`${config.label} 배경을 불러오는 중입니다...`);

            try {
              let provider;
              if (mapId === "satellite") {
                provider = await Cesium.createWorldImageryAsync({
                  style: Cesium.IonWorldImageryStyle.AERIAL_WITH_LABELS
                });
              } else {
                provider = await Cesium.createWorldImageryAsync({
                  style: Cesium.IonWorldImageryStyle.ROAD
                });
              }
              publicBaseLayer = viewer.imageryLayers.addImageryProvider(provider, 0);
              publicBaseLayer.alpha = mapId === "light" ? 0.72 : 1.0;
              viewer.scene.globe.baseColor = Cesium.Color.WHITE;
              viewer.scene.requestRender();
              setStatus(`${config.label} 배경을 적용했습니다.`);
            } catch (error) {
              console.error("Cesium ion 배경지도 로드 실패", error);
              viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString("#d9e3ec");
              setStatus(`배경지도 로드 실패: ${error.message}`);
            }
          }
          '''

          text = text[:start] + replacement + text[end:]
          text = text.replace(
              'setTimeout(() => applyPublicBaseMap("street"), 300);',
              'setTimeout(() => { applyPublicBaseMap("street"); }, 300);'
          )
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit patched map
        run: |
          if git diff --quiet -- index_view_candidates.html; then
            echo 'No changes needed.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index_view_candidates.html
          git commit -m 'Fix embedded Cesium base map loader'
          git push
