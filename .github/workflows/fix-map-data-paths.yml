name: Patch embedded Cesium map

on:
  workflow_dispatch:
  issues:
    types: [opened, reopened]
  push:
    paths:
      - '.trigger_camera_unit_patch'

permissions:
  contents: write

jobs:
  patch-map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch index_view_candidates.html
        run: python scripts/patch_cesium_map.py

      - name: Commit patched map
        run: |
          if git diff --quiet -- index_view_candidates.html; then
            echo "No changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index_view_candidates.html
          git commit -m "Fix camera and candidate unit visibility"
          git push
