name: Audit view angles by pyeong

on:
  push:
    paths:
      - tools/audit_view_angles_by_pyeong.py
      - .github/workflows/audit-view-angles-by-pyeong.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run audit
        run: python tools/audit_view_angles_by_pyeong.py | tee data/view_angle_by_pyeong_audit.log
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/view_angle_by_pyeong_audit.json data/view_angle_by_pyeong_audit.csv data/view_angle_by_pyeong_audit.md data/view_angle_by_pyeong_audit.log
          if ! git diff --cached --quiet; then
            git commit -m "Audit conservative view angles by pyeong"
            git push
          fi
